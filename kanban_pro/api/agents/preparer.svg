<rect class="paper" x="29" y="37" width="13" height="13" rx="1"/>
<rect class="paper" x="44" y="37" width="13" height="13" rx="1"/>
<g id="top-box"><rect class="paper" x="36.5" y="22" width="13" height="13" rx="1"/><path class="line" d="M39 27h8"/></g>
<path class="line" d="M21 28 34 24"/>
<g id="spark"><path class="line" d="M53 17v5M50.5 19.5h5"/></g>
</svg>