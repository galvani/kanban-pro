<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kanban-pro</title>
<!-- inline SVG favicon: three kanban lanes in the app palette (accent/ok/dim) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%231d2026'/%3E%3Crect%20x='5'%20y='7'%20width='6'%20height='18'%20rx='2'%20fill='%234f8cff'/%3E%3Crect%20x='13'%20y='7'%20width='6'%20height='11'%20rx='2'%20fill='%233fb96b'/%3E%3Crect%20x='21'%20y='7'%20width='6'%20height='15'%20rx='2'%20fill='%238a919e'/%3E%3C/svg%3E">

<style>
  /* Design tokens — "Redesign for readability" (claude.ai/design). The palette is oklch:
     one neutral ramp (hue 260) for chrome, and a HUE PER MEANING for everything semantic
     (lane, agent, severity). Colour is never decoration here — it encodes which agent and
     which lane, so a card can be read at a glance from across the board. */
  :root {
    --bg: oklch(0.17 0.012 260); --panel: oklch(0.205 0.012 260);
    --card: oklch(0.245 0.013 260); --card-hover: oklch(0.27 0.013 260);
    --text: oklch(0.96 0.005 260); --dim: oklch(0.62 0.01 260);
    --accent: oklch(0.72 0.14 250); --ok: oklch(0.75 0.14 150);
    --border: oklch(0.30 0.01 260); --border-hi: oklch(0.42 0.02 260);
    --danger: oklch(0.68 0.18 25); --warn: oklch(0.78 0.16 70);
    --sunken: oklch(0.155 0.012 260);
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  /* links were falling back to the browser's default blue (#0000ee) on a dark panel — legible
     only in the .desc/.comment scopes that happened to override it. One rule, everywhere. */
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: oklch(0.8 0.13 250); text-decoration: underline; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.45 system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px; padding: 9px 16px;
           background: var(--panel); border-bottom: 1px solid oklch(0.28 0.01 260); flex: none; }
  header h1 { font-size: 16px; margin: 0; font-weight: 800; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }
  select { background: oklch(0.24 0.012 260); color: var(--text);
           border: 1px solid oklch(0.32 0.01 260); border-radius: 8px; padding: 5px 9px;
           font-weight: 600; font-size: 12.5px; }
  /* the filter row: a segmented control, not three loose checkboxes with a lone dropdown */
  .filters { display: flex; align-items: center; gap: 4px; padding: 3px; border-radius: 9px;
             border: 1px solid oklch(0.30 0.01 260); background: oklch(0.235 0.012 260); }
  .filters label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
                   user-select: none; padding: 4px 10px; border-radius: 7px; font-size: 12px;
                   font-weight: 600; color: oklch(0.66 0.01 260); }
  .filters label:hover { background: oklch(0.28 0.012 260); }
  .filters label:has(input:checked) { background: oklch(0.32 0.05 250 / 0.45);
                                      color: oklch(0.88 0.1 250); }
  .filters select { border: 0; background: transparent; padding: 3px 4px; }
  .filters { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--dim); }
  .filters label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  .filters input[type=checkbox] { accent-color: var(--accent); cursor: pointer; margin: 0; }
  .filters select { padding: 2px 6px; font-size: 12px; }
  .meta { margin-left: auto; display: flex; gap: 10px; align-items: center;
          color: var(--dim); font-size: 12px; }
  /* stale cards (no activity in >7d): dimmed but still there; hover restores. */
  .card.stale { opacity: .42; }
  .card.stale:hover { opacity: 1; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .dot.live { background: var(--ok); }
  #board { flex: 1; display: flex; gap: 12px; padding: 14px; overflow-x: auto; overflow-y: hidden;
           align-items: flex-start; height: 100%; }
  /* --lane-h: the column's hue, set per-column in JS from its category (see LANE_HUE) */
  .col { background: var(--panel); border: 1px solid oklch(0.29 0.01 260); border-radius: 11px;
         flex: none; width: 266px; max-height: 100%; display: flex; flex-direction: column;
         overflow: hidden; transition: width .2s; }
  .col h2 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em;
            margin: 0; padding: 10px 13px; display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; flex: none;
            font-weight: 800; color: oklch(0.9 0.02 var(--lane-h, 260)); }
  .col h2 .laneDot { width: 8px; height: 8px; border-radius: 50%; flex: none;
                     background: oklch(0.74 0.13 var(--lane-h, 260)); }
  .col h2 .laneCount { margin-left: auto; min-width: 20px; text-align: center; padding: 1px 6px;
                       border-radius: 20px; font-size: 11.5px; font-weight: 800;
                       background: oklch(0.32 0.05 var(--lane-h, 260) / 0.5);
                       color: oklch(0.85 0.10 var(--lane-h, 260)); }
  .col.empty h2 { color: oklch(0.62 0.03 var(--lane-h, 260)); }
  /* collapsed lane: a 44px vertical rail — the name stays readable, the cards fold away */
  .col.collapsed { width: 44px; }
  .col.collapsed h2 { writing-mode: vertical-rl; justify-content: flex-start; height: 100%;
                      padding: 11px 0; border-bottom: 0; }
  .col.collapsed h2 .laneCount { margin-left: 0; margin-top: 6px; }
  .col.collapsed .cards { display: none; }
  .col.dragover { outline: 2px dashed var(--accent); outline-offset: -4px; }
  .cards { padding: 8px 9px 40px; overflow-y: auto; overflow-x: hidden;
           display: flex; flex-direction: column; gap: 8px; flex: 1; }
  /* --acc-h: the card's accent hue = its primary agent's hue (attention → amber) */
  .card { background: var(--card); border: 1px solid oklch(0.32 0.01 260);
          border-left: 3px solid oklch(0.70 0.13 var(--acc-h, 260)); border-radius: 8px;
          padding: 9px 11px; cursor: grab; transition: opacity .15s, border-color .12s; }
  .card:hover { border-color: var(--border-hi); opacity: 1 !important; }
  .card .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
  .card .badges:empty { display: none; }
  .card .t { font-size: 13px; font-weight: 600; line-height: 1.38; color: oklch(0.95 0.005 260);
             word-break: break-word; text-wrap: pretty; }
  /* the preview is two lines, clamped — a wall of text on the card face is what made the
     old board unreadable; the detail panel is where the full text belongs */
  .card .preview { margin-top: 7px; font-size: 11.5px; line-height: 1.42; color: oklch(0.66 0.01 260);
                   display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
                   overflow: hidden; }
  .card .sub { display: flex; align-items: center; gap: 7px; margin-top: 9px; font-size: 11px; }
  .card .sub .hash { font-family: var(--mono); font-size: 11px; color: oklch(0.58 0.01 260); }
  .card .sub .when { margin-left: auto; font-weight: 600; color: oklch(0.64 0.01 260); }
  /* copy-id: revealed on hover only — present when wanted, silent when not */
  .card .copy { padding: 1px 7px; border-radius: 5px; font-size: 10px; line-height: 16px;
                font-weight: 700; border: 1px solid oklch(0.36 0.01 260);
                background: oklch(0.28 0.012 260); color: oklch(0.72 0.01 260);
                opacity: 0; pointer-events: none; transition: opacity .12s; cursor: pointer; }
  .card:hover .copy { opacity: 1; pointer-events: auto; }
  .card .copy.copied { border-color: oklch(0.6 0.1 150 / 0.5); background: oklch(0.4 0.08 150 / 0.35);
                       color: oklch(0.82 0.11 150); }
  /* --chip-h: the agent's hue (AGENT_HUE) — same agent, same colour, everywhere */
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 5px;
          font-size: 10px; font-weight: 700; letter-spacing: .03em; white-space: nowrap;
          background: oklch(0.33 0.06 var(--chip-h, 260) / 0.55);
          color: oklch(0.85 0.12 var(--chip-h, 260));
          border: 1px solid oklch(0.55 0.09 var(--chip-h, 260) / 0.45); }
  .chip .cdot { width: 5px; height: 5px; border-radius: 50%; flex: none;
                background: oklch(0.8 0.14 var(--chip-h, 260)); }
  .chip.attn { background: var(--warn); color: oklch(0.24 0.06 70); border: 0; text-transform: uppercase;
               font-weight: 800; letter-spacing: .04em; }
  .chip.attn .cdot { background: oklch(0.24 0.06 70); border-radius: 1px; transform: rotate(45deg); }
  .chip svg { margin-right: 2px; }
  /* per-agent colours are no longer hand-listed: the hue comes from AGENT_HUE in JS, so a new
     agent gets a stable colour with no CSS edit. `unknown` still shouts — an assignee the
     dispatcher doesn't route to is a mistake, not a colour. */
  .chip.unknown { background: oklch(0.32 0.09 25 / 0.5); border-color: var(--danger);
                  color: oklch(0.82 0.14 25); }
  .chip.unknown::before { content: "⚠️"; margin-right: 2px; }
  .chip.live { background: oklch(0.32 0.05 150 / 0.5); color: oklch(0.85 0.12 150);
               border-color: oklch(0.55 0.09 150 / 0.45); }
  /* the lane pill in the card dialog — same hue as the lane it names */
  .lanePill { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 20px;
              font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
              background: oklch(0.32 0.06 var(--lane-h, 260) / 0.45);
              color: oklch(0.82 0.12 var(--lane-h, 260));
              border: 1px solid oklch(0.55 0.09 var(--lane-h, 260) / 0.4); }
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 12px; width: min(1400px, 96vw); max-height: 90vh; overflow-y: auto; }
  /* showModal() focuses the first focusable child — which was the assignee <select>, so the
     dialog opened with a control highlighted and one stray keystroke away from a reassign.
     `autofocus` on the dialog itself keeps focus on the dialog (and off any control). */
  dialog:focus, dialog:focus-visible { outline: none; }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  dialog .body { padding: 18px 20px; }
  dialog h3 { margin: 0 0 4px; }
  dialog .desc { color: var(--text); margin: 10px 0;
                 border-left: 3px solid var(--border); padding-left: 10px; }
  dialog h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
              color: var(--dim); margin: 16px 0 6px; }
  .comment { border-top: 1px solid var(--border); padding: 8px 0; }
  .comment .who { font-size: 11px; color: var(--dim); }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
           border-radius: 4px; margin-right: 4px; text-transform: uppercase; }
  .badge-summary    { background: #2d3d1f; color: #b0e090; }
  .badge-escalate   { background: #3d1f1f; color: #f09090; }
  .badge-coder-findings { background: #1f2d3d; color: #90c0f0; }
  .gateLabel { display: inline-block; font-size: 11px; font-weight: 600; color: var(--dim);
               min-width: 120px; }
  .gateVal { color: var(--text); }
  .attention { background: #3a2b12; border: 1px solid #8a6d1f; border-radius: 8px;
               padding: 8px 12px; margin: 10px 0; font-size: 13px; }
  .metaGrid { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 12px;
               align-items: center; }
  .metaGrid .mi { display: inline-flex; align-items: center; gap: 5px;
                  min-width: calc(50% - 8px); flex: 1 0 calc(50% - 8px); }
  .metaGrid .mi:only-child { min-width: auto; flex: none; }
  .metaGrid .mk { color: var(--dim); white-space: nowrap; flex: none; }
  .metaGrid .mv { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  /* Move-to: a legal target is lit in its lane's hue; an ILLEGAL one is still shown, dashed and
     dimmed, because hiding it hides the flow. ⌘/Ctrl-click forces it (audited, never silent). */
  .moveBtns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .moveBtns button { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px;
                     border-radius: 8px; font-size: 12px; font-weight: 600; white-space: nowrap;
                     border: 1px solid oklch(0.52 0.08 var(--lane-h, 260) / 0.45);
                     background: oklch(0.30 0.055 var(--lane-h, 260) / 0.4);
                     color: oklch(0.87 0.10 var(--lane-h, 260)); }
  .moveBtns button .cdot { width: 6px; height: 6px; border-radius: 50%; flex: none;
                           background: oklch(0.76 0.13 var(--lane-h, 260)); }
  .moveBtns button.illegal { border: 1px dashed oklch(0.3 0.008 260); background: transparent;
                             color: oklch(0.44 0.01 260); opacity: .55; }
  .moveBtns button.illegal .cdot { background: oklch(0.4 0.01 260); }
  .moveBtns button.illegal:hover { opacity: .9; }
  /* tabbed detail: the old dialog stacked report+comments+activity+log in one scroll, which is
     exactly what buried the work report. One tab at a time; the report is the default. */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin: 14px 0 0; }
  .tabs button { display: inline-flex; align-items: center; gap: 7px; padding: 9px 15px;
                 border: 0; background: none; cursor: pointer; font-size: 13px; font-weight: 600;
                 color: oklch(0.6 0.01 260); border-bottom: 2px solid transparent;
                 border-radius: 0; margin-bottom: -1px; }
  .tabs button .cdot { width: 7px; height: 7px; border-radius: 50%; flex: none; opacity: .55;
                       background: oklch(0.74 0.13 var(--tab-h, 260)); }
  .tabs button.on { font-weight: 700; color: oklch(0.95 0.005 260); border-bottom-color: var(--accent); }
  .tabs button.on .cdot { opacity: 1; }
  .tabs button .cdot.pulse { animation: kpPulse 1.4s ease-in-out infinite; }
  @keyframes kpPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .tabPane { padding-top: 16px; }
  .tabPane[hidden] { display: none; }
  .emptyPane { display: flex; flex-direction: column; align-items: center; justify-content: center;
               gap: 9px; padding: 64px 24px; text-align: center; color: oklch(0.55 0.01 260); }
  .emptyPane .glyph { width: 38px; height: 38px; border-radius: 9px; display: flex;
                      align-items: center; justify-content: center; font-size: 17px;
                      border: 1.5px solid oklch(0.36 0.01 260); color: oklch(0.5 0.01 260); }
  .emptyPane .lead { font-size: 14px; font-weight: 600; color: oklch(0.72 0.01 260); }
  .emptyPane .sub { font-size: 12.5px; line-height: 1.45; max-width: 340px; }
  .relRow { font-size: 13px; padding: 3px 0; }
  .relRow a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .reportSec { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
               margin: 8px 0; background: #1a1d23; }
  .reportSec h4 { margin: -8px -10px 8px; padding: 6px 10px; border-radius: 8px 8px 0 0;
                 font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
                 cursor: pointer; user-select: none; }
  /* collapsed: the header alone remains, so the section is still there to click back open */
  .reportSec.collapsed { padding-bottom: 0; }
  .reportSec.collapsed h4 { margin-bottom: -8px; border-radius: 8px; }
  .reportSec.collapsed .secBody { display: none; }
  .secCaret { display: inline-block; width: 12px; margin-right: 4px; transition: transform .12s; }
  .reportSec.collapsed .secCaret { transform: rotate(-90deg); }
  .hdr-findings    { background: #3d1f2a; color: #f0a0b0; }
  .hdr-checks      { background: #1f2d3d; color: #90c0f0; }
  .hdr-verdict     { background: #2d3d1f; color: #b0e090; }
  .hdr-handoff     { background: #3d2d1f; color: #f0c090; }
  .hdr-about       { background: #2a1f3d; color: #c0a0f0; }
  .hdr-plan        { background: #1f3d3d; color: #90e0e0; }
  .hdr-analysis_log,
  .hdr-analysis    { background: #3d1f2a; color: #f0a0b0; }
  .hdr-needs       { background: #3d2d2d; color: #f0b0b0; }
  .hdr-questions   { background: #2d2d3d; color: #c0c0f0; }
  .hdr-unknown     { background: #2d323e; color: #d4d7de; }
  .reportItem { border-top: 1px solid #252a33; padding: 7px 0; }
  .reportItem:first-of-type { border-top: 0; }
  .reportItem .rid { color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; }
  .reportItem.open { border-left: 3px solid #8a6d1f; padding-left: 8px; }
  .objGrid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
  .objRow { display: contents; }
  .objKey { color: var(--dim); font-family: ui-monospace, monospace; font-size: 11px;
            text-align: right; white-space: nowrap; padding-top: 1px; }
  .objVal { word-break: break-word; }
  .objVal code { font-size: 11px; background: #1a1d23; padding: 1px 5px; border-radius: 3px; }
  .mrLink { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 12px;
            border-radius: 6px; background: #1f3d2f; color: #4ae8a0; text-decoration: none;
            border: 1px solid #2a6b3f; }
  .answerBox { display: flex; gap: 6px; margin-top: 6px; }
  .answerBox input { min-width: 0; }
  .activity { font-size: 12px; max-height: 220px; overflow-y: auto; }
  .activity .ev { display: flex; gap: 8px; padding: 2px 0; border-top: 1px solid #22262e; }
  .activity .t { color: var(--dim); white-space: nowrap; }
  .activity .who { color: var(--accent); white-space: nowrap; }
  .activity .forced { color: var(--danger); font-weight: 600; }
  details.ext { margin-top: 12px; font-size: 12px; }
  details.ext pre { background: #14161a; border: 1px solid var(--border); border-radius: 6px;
                    padding: 8px; overflow-x: auto; max-height: 180px; }
  form { display: flex; gap: 8px; margin-top: 12px; }
  input[type=text] { flex: 1; background: var(--card); border: 1px solid var(--border);
                     color: var(--text); border-radius: 6px; padding: 7px 9px; }
  button { background: var(--accent); border: 0; color: white; border-radius: 6px;
           padding: 7px 14px; cursor: pointer; }
  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
           background: var(--danger); color: white; padding: 8px 16px; border-radius: 8px;
           opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 80vw; }
  #toast.show { opacity: 1; }
  .chip.live { border-color: var(--ok); color: var(--ok); }
  button.linkbtn { background: transparent; color: var(--accent); border: 1px solid var(--border);
                   padding: 2px 8px; font-size: 12px; border-radius: 6px; cursor: pointer; }
  button.linkbtn:hover { border-color: var(--accent); }
  /* session-log viewer */
  #logTitle { display: flex; align-items: center; gap: 10px; }
  #logLive { font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 600; }
  #logLive.live { background: #123a1f; color: var(--ok); border: 1px solid #2a6b3f; }
  #logLive.done { background: #22262e; color: var(--dim); border: 1px solid var(--border); }
  .logView { font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background: #14161a;
             border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 10px;
             max-height: 62vh; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .logView .le { padding: 3px 0; border-top: 1px solid #20242c; }
  .logView .le:first-child { border-top: 0; }
  .logView .role { color: var(--dim); font-size: 10px; text-transform: uppercase;
                   letter-spacing: .05em; margin-right: 6px; }
  .logView .le.assistant .role { color: var(--accent); }
  .logView .le.tool_use { color: #cbd6e6; }
  .logView .le.tool_use .role { color: var(--ok); }
  .logView .le.tool_result { color: var(--dim); }
  .logView .le.thinking { color: var(--dim); font-style: italic; }
  .logView .le.summary { color: var(--dim); }
  /* rendered markdown (card description + comments) */
  .md-h { font-size: 13px; font-weight: 600; text-transform: none; letter-spacing: 0;
          color: var(--text); margin: 12px 0 4px; }
  h1.md-h { font-size: 15px; } h2.md-h { font-size: 14px; }
  .md-p { margin: 6px 0; }
  .md-p:first-child { margin-top: 0; }
  .md-list { margin: 6px 0; padding-left: 22px; }
  .md-list li { margin: 2px 0; }
  .md-ic { background: #14161a; border: 1px solid var(--border); border-radius: 4px;
           padding: 0 4px; font-family: ui-monospace, monospace; font-size: 12px; }
  .md-code { background: #14161a; border: 1px solid var(--border); border-radius: 6px;
             padding: 8px; overflow-x: auto; margin: 8px 0; }
  .md-code code { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre; }
  .desc a, .comment a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>kanban<span>-pro</span></h1>
  <select id="boardSel" title="board"></select>
  <div class="filters">
    <label title="hide lanes with no visible cards"><input type="checkbox" id="fEmpty"> empty</label>
    <label title="hide done + won't-do (terminal) lanes"><input type="checkbox" id="fDone"> done</label>
    <label title="cards with no activity in over 7 days">&gt;7d
      <select id="fStale">
        <option value="show">show</option>
        <option value="dim">dim</option>
        <option value="hide">hide</option>
      </select>
    </label>
  </div>
  <div class="meta">
    <span id="profile"></span><span id="actor"></span>
    <div class="dot" id="liveDot" title="live event stream"></div>
  </div>
</header>
<div id="board"></div>

<dialog id="cardDlg" tabindex="-1" autofocus><div class="body">
  <h3 id="dlgTitle"></h3>
  <div class="sub" id="dlgMeta" style="color:var(--dim);font-size:12px"></div>
  <div id="dlgAttention"></div>
  <dl class="metaGrid" id="dlgGrid"></dl>
  <h4>Move to</h4>
  <div class="moveBtns" id="dlgMoves"></div>

  <!-- tabs: one pane at a time. The work report is the default — it is the card's current
       truth, and in the old single-scroll dialog it sat below the description and above the
       comments, i.e. exactly where nobody looked. -->
  <div class="tabs" id="dlgTabs"></div>
  <div class="tabPane" id="paneReport">
    <div id="dlgWorkReport"></div>
    <div id="dlgRelations"></div>
  </div>
  <div class="tabPane" id="paneSpec" hidden>
    <div class="desc" id="dlgDesc"></div>
  </div>
  <div class="tabPane" id="paneSession" hidden>
    <div id="dlgSessionMeta"></div>
    <div class="logView" id="dlgSessionLog"></div>
  </div>
  <div class="tabPane" id="paneComments" hidden>
    <div id="dlgComments"></div>
    <form id="commentForm">
      <input type="text" id="commentBody" placeholder="add a comment…" autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>
  <div class="tabPane" id="paneActivity" hidden>
    <div class="activity" id="dlgActivity"></div>
    <details class="ext" id="dlgExt"><summary>ext (raw)</summary><pre id="dlgExtPre"></pre></details>
  </div>
</div></dialog>

<dialog id="logDlg" tabindex="-1" autofocus><div class="body">
  <h3 id="logTitle">session log <span id="logLive"></span></h3>
  <div class="logView" id="logView"></div>
  <div style="margin-top:12px;display:flex;justify-content:flex-end">
    <button id="logClose" class="linkbtn">Close</button>
  </div>
</div></dialog>
<div id="toast"></div>

<script>
/* Push-fed board: one snapshot per board switch, then SSE deltas. No polling timers. */
let boardId = null, lastBoard = null, activeTab = 'report', cursor = 0, es = null, refreshTimer = null, reconnectTimer = null, detailRefreshTimer = null, openCardId = null, knownAssignees = [], reportRequiredByAssignee = {}, reportSectionOrder = [], reportSectionOrderByAssignee = {}, maxRetries = 5;

const A = (paths) => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg> `;
const ASSIGNEE_GLYPHS = {
  "prepare": A(`<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>`),
  "builder-coder": A(`<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>`),
  "builder-architect": A(`<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>`),
  "reviewer": A(`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`),
  "rebaser": A(`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`),
  "scribe": A(`<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>`),
  "analytics": A(`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`),
  "status-audit": A(`<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`),
  "discovery": A(`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`),
  "builder-sonnet": A(`<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`),
  "dispatcher": A(`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`),
  "hermes-engineer": A(`<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`),
};

/* --- the hue system (design: "Redesign for readability") ------------------------------
   Colour carries meaning, so it must be STABLE: the same agent is the same hue on a card,
   in a comment, in the activity feed. Hues are derived, not hand-assigned per class, so a
   new agent or lane gets a coherent colour without a CSS edit. */
const AGENT_HUE = {
  "claude-code": 255, "codex": 300, "hermes-engineer": 175, "builder-architect": 70,
  "reviewer": 15, "reviewer-architect": 15, "rebaser": 150, "scribe": 305, "discovery": 200,
  "analytics": 255, "status-audit": 175, "prepare": 40, "builder-coder": 250,
  "builder-sonnet": 340, "dispatcher": 220, "jan": 60,
};
//: lane hue by column CATEGORY — the portable semantic (a board's column NAMES are free-form,
//: its categories are not), so any board colours correctly without configuration.
const LANE_HUE = { triage: 220, backlog: 220, unstarted: 250, started: 70, done: 150, canceled: 25 };
const agentHue = a => {
  const name = String(a ?? "").split(":").pop();
  if (AGENT_HUE[name] != null) return AGENT_HUE[name];
  // stable fallback: hash the name to a hue, so an unlisted agent is still consistently coloured
  let h = 0;
  for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) % 360;
  return h;
};
const laneHue = col => LANE_HUE[col?.category] ?? 260;
/* Cards fade as they go stale (>24h), floor at 7d — old work recedes without disappearing. */
function ageOpacity(ts) {
  if (!ts) return 1;
  const h = (Date.now() - new Date(ts).getTime()) / 3600000;
  if (h <= 24) return 1;
  if (h >= 168) return 0.4;
  return +(1 - ((h - 24) / 144) * 0.6).toFixed(3);
}
const agentChip = (actor, extra = "") => {
  const name = String(actor ?? "").split(":").pop();
  return `<span class="chip ${extra}" style="--chip-h:${agentHue(name)}"><span class="cdot"></span>${esc(name)}</span>`;
};

const $ = id => document.getElementById(id);
const api = async (path, opts) => {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg = res.statusText;
    try { msg = (await res.json()).message || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
};
const toast = msg => {
  $("toast").textContent = msg; $("toast").classList.add("show");
  setTimeout(() => $("toast").classList.remove("show"), 3500);
};

async function loadMeta() {
  const m = await api("/api/meta");
  $("profile").textContent = "profile: " + m.profile;
  $("actor").textContent = "actor: " + m.actor;
  knownAssignees = m.known_assignees || [];
  reportRequiredByAssignee = m.report_required_by_assignee || {};
  reportSectionOrder = m.report_section_order || [];
  reportSectionOrderByAssignee = m.report_section_order_by_assignee || {};
  maxRetries = m.max_retries || 5;
}

async function loadBoards() {
  const boards = await api("/api/boards");
  const sel = $("boardSel");
  sel.innerHTML = "";
  for (const b of boards) sel.add(new Option(b.name, b.id));
  if (boards.length && !boardId) boardId = boards[0].id;
  sel.value = boardId;
  sel.onchange = () => { boardId = sel.value; refresh(); };
}

function age(ts) {
  if (!ts) return "";
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 3600) return Math.max(1, Math.round(s / 60)) + "m";
  if (s < 86400) return Math.round(s / 3600) + "h";
  return Math.round(s / 86400) + "d";
}

/* --- collapsed lanes (client-only, persisted): a folded lane stays on the board as a 44px
   rail rather than vanishing, so you can always see it exists and click it back open. --- */
const COLLAPSE_KEY = "kanban-pro-collapsed";
const collapsedSet = () => {
  try { return new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY)) || []); } catch { return new Set(); }
};
const isCollapsed = colId => collapsedSet().has(colId);
function toggleCollapsed(colId) {
  const s = collapsedSet();
  s.has(colId) ? s.delete(colId) : s.add(colId);
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...s]));
}

/* --- view filters (client-only, persisted in localStorage) --- */
const FILTER_KEY = "kanban-pro-filters", STALE_MS = 7 * 86400 * 1000;
function filterState() {
  try { return JSON.parse(localStorage.getItem(FILTER_KEY)) || {}; } catch { return {}; }
}
function isStale(card) {                 // no activity in >7 days
  const ts = card.updated_at || card.created_at;
  return !!ts && (Date.now() - new Date(ts).getTime()) > STALE_MS;
}
function initFilters() {
  const f = filterState();
  $("fEmpty").checked = !!f.empty;
  $("fDone").checked = !!f.done;
  $("fStale").value = f.stale || "show";
  const onChange = () => {
    localStorage.setItem(FILTER_KEY, JSON.stringify(
      { empty: $("fEmpty").checked, done: $("fDone").checked, stale: $("fStale").value }));
    refresh();
  };
  for (const id of ["fEmpty", "fDone", "fStale"]) $(id).onchange = onChange;
}

function cardEl(card) {
  const el = document.createElement("div");
  el.className = "card"; el.draggable = true; el.dataset.id = card.id;
  const ext = card.ext || {};
  const chips = [];
  // attention leads, always: it is the one badge that means "a human or agent must act"
  if (ext["kanban_pro.attention"]) {
    const sev = ext["kanban_pro.attention"].severity || "block";
    chips.push(`<span class="chip attn"><span class="cdot"></span>${esc(sev)}</span>`);
  }
  if (ext._claim) {
    const hasLog = !!((ext.session || {}).log || (ext.work || {}).log);
    const who = String(ext._claim.owner).split(":").pop();
    chips.push(`<span class="chip live" title="claimed by ${esc(ext._claim.owner)}${hasLog ? " · session log linked" : ""}"><span class="cdot"></span>▶ ${esc(who)}${hasLog ? " 📜" : ""}</span>`);
  }
  for (const a of card.assignees || []) {
    const known = knownAssignees.includes(a);
    chips.push(`<span class="chip ${known ? "" : "unknown"}" style="--chip-h:${agentHue(a)}"><span class="cdot"></span>${esc(a)}</span>`);
  }
  // first-class card.priority (0-10, higher = more urgent) wins; the ext.hermes/ext.work
  // priorities are the older backend-supplied ones, kept as a fallback for legacy cards.
  const prio = card.priority || ((ext.hermes || {}).priority ?? (ext.work || {}).priority);
  if (prio != null && prio !== 0) chips.push(`<span class="chip" style="--chip-h:${prio >= 7 ? 25 : 250}"><span class="cdot"></span>p${esc(prio)}</span>`);
  if (ext["kanban_pro.scheme"]) chips.push(`<span class="chip"><span class="cdot"></span>${esc(ext["kanban_pro.scheme"])}</span>`);
  const retry = (ext.work || {}).retry_at;
  if (retry) chips.push(`<span class="chip" style="--chip-h:200"><span class="cdot"></span>📅 ${esc(new Date(retry * 1000).toLocaleString())}</span>`);

  // the card's accent = its primary agent's hue (attention overrides to amber): the left edge
  // alone tells you who owns the card, without reading a word of it
  const primary = (card.assignees || [])[0] || (ext._claim || {}).owner;
  const accH = ext["kanban_pro.attention"] ? 70 : (primary ? agentHue(primary) : 260);
  el.style.setProperty("--acc-h", accH);
  el.style.opacity = ageOpacity(card.updated_at || card.created_at);

  const when = age(card.updated_at || card.created_at);
  el.innerHTML = `<div class="badges">${chips.join("")}</div>
                  <div class="t">${esc(card.title)}</div>
                  ${ext._last_comment ? `<div class="preview">${esc(ext._last_comment)}</div>` : ""}
                  <div class="sub">
                    <span class="hash">${esc(card.id.slice(0, 10))}</span>
                    <button type="button" class="copy" title="Copy card id">copy id</button>
                    ${when ? `<span class="when">${when}</span>` : ""}
                  </div>`;
  el.querySelector(".copy").addEventListener("click", async ev => {
    ev.stopPropagation();                     // the card itself opens the dialog on click
    const btn = ev.currentTarget;
    try { await navigator.clipboard.writeText(card.id); } catch { return toast("clipboard blocked"); }
    btn.textContent = "copied ✓"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "copy id"; btn.classList.remove("copied"); }, 1400);
  });
  el.addEventListener("dragstart", ev => ev.dataTransfer.setData("text/plain", card.id));
  el.addEventListener("click", () => openCard(card.id));
  return el;
}
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* Minimal, dependency-free markdown for card descriptions + comments. HTML is escaped
   FIRST, then a safe subset is applied — headings, bold/italic, inline + fenced code,
   ordered/unordered lists, [text](url) links and bare URLs (http/https/mailto/relative
   only). No raw HTML can pass through. Kept small on purpose; not a full CommonMark. */
function mdInline(s) {                          /* s is already HTML-escaped */
  const toks = [];
  const stash = html => `\u0000${toks.push(html) - 1}\u0000`;
  s = s.replace(/`([^`]+)`/g, (_, c) => stash(`<code class="md-ic">${c}</code>`));
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, txt, url) =>
    /^(https?:|mailto:|\/)/.test(url) ? stash(`<a href="${url}" target="_blank" rel="noopener">${txt}</a>`) : `[${txt}](${url})`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\s][^*]*)\*/g, "$1<em>$2</em>").replace(/(^|[^_\w])_([^_\s][^_]*)_/g, "$1<em>$2</em>");
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, (_, pre, url) => pre + stash(`<a href="${url}" target="_blank" rel="noopener">${url}</a>`));
  return s.replace(/\u0000(\d+)\u0000/g, (_, n) => toks[n]);
}
function md(src) {
  const lines = String(src ?? "").replace(/\r\n?/g, "\n").split("\n");
  const isBlock = l => /^(#{1,6})\s|^```|^\s*\d+\.\s|^\s*[-*+]\s|^\s*$/.test(l);
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    let m;
    if (/^```/.test(line)) {                    /* fenced code — verbatim, no inline md */
      const buf = []; i++;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) buf.push(lines[i++]);
      i++;                                       /* skip closing fence */
      out.push(`<pre class="md-code"><code>${esc(buf.join("\n"))}</code></pre>`);
    } else if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
      const n = m[1].length;
      out.push(`<h${n} class="md-h">${mdInline(esc(m[2]))}</h${n}>`);
      i++;
    } else if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*\d+\.\s+/, ""));
      out.push(`<ol class="md-list">${items.map(t => `<li>${mdInline(esc(t))}</li>`).join("")}</ol>`);
    } else if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*[-*+]\s+/, ""));
      out.push(`<ul class="md-list">${items.map(t => `<li>${mdInline(esc(t))}</li>`).join("")}</ul>`);
    } else if (/^\s*$/.test(line)) {
      i++;
    } else {                                     /* paragraph: gather until blank/block */
      const para = [];
      while (i < lines.length && !isBlock(lines[i])) para.push(mdInline(esc(lines[i++])));
      out.push(`<p class="md-p">${para.join("<br>")}</p>`);
    }
  }
  return out.join("");
}

async function refresh() {
  if (!boardId) return;
  const snap = await api(`/api/boards/${boardId}`);
  lastBoard = snap.board;          // the dialog needs every lane (incl. flow-illegal ones)
  cursor = Math.max(cursor, snap.cursor);
  const root = $("board");
  root.innerHTML = "";
  const f = filterState();
  for (const col of [...snap.board.columns].sort((a, b) => a.order - b.order)) {
    // hide done: terminal lanes (done + canceled/won't-do) — reduces end-of-pipeline clutter
    if (f.done && (col.category === "done" || col.category === "canceled")) continue;
    let cards = snap.cards.filter(c =>
      (c.placements || []).some(p => p.board_id === boardId && p.column_id === col.id));
    if (f.stale === "hide") cards = cards.filter(c => !isStale(c));
    if (f.empty && !cards.length) continue;   // hide empty: drop lanes with nothing to show
    cards.sort((a, b) => {
      const pa = a.placements.find(p => p.column_id === col.id).position;
      const pb = b.placements.find(p => p.column_id === col.id).position;
      // every move lands at position 0, so lanes like done are all ties —
      // break them by recency, newest activity on top
      return (pa - pb) || String(b.updated_at ?? "").localeCompare(String(a.updated_at ?? ""));
    });
    const el = document.createElement("div");
    el.className = "col" + (cards.length ? "" : " empty") + (isCollapsed(col.id) ? " collapsed" : "");
    el.style.setProperty("--lane-h", laneHue(col));
    el.innerHTML = `<h2 title="click to fold this lane">
                      <span class="laneDot"></span>
                      <span class="laneName">${esc(col.name)}</span>
                      <span class="laneCount">${cards.length}${col.wip_limit ? "/" + col.wip_limit : ""}</span>
                    </h2>`;
    el.querySelector("h2").addEventListener("click", () => { toggleCollapsed(col.id); refresh(); });
    const list = document.createElement("div");
    list.className = "cards";
    for (const c of cards) {
      const cardE = cardEl(c);
      if (f.stale === "dim" && isStale(c)) cardE.classList.add("stale");  // gray out, keep visible
      list.appendChild(cardE);
    }
    el.appendChild(list);
    el.addEventListener("dragover", ev => { ev.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave", () => el.classList.remove("dragover"));
    el.addEventListener("drop", async ev => {
      ev.preventDefault(); el.classList.remove("dragover");
      const id = ev.dataTransfer.getData("text/plain");
      try {
        await api(`/api/cards/${id}/move`, {
          method: "POST", headers: {"content-type": "application/json"},
          body: JSON.stringify({to_board_id: boardId, to_column_id: col.id, position: 0}),
        });
      } catch (e) { toast(e.message); }
      /* no manual refresh — the SSE event triggers it */
    });
    root.appendChild(el);
  }
  connect();
}

function scheduleRefresh() {           /* debounce bursts of pushed events */
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 150);
}

function scheduleOpenCardRefresh() {    /* keep an already-open detail dialog live */
  if (!openCardId) return;
  clearTimeout(detailRefreshTimer);
  detailRefreshTimer = setTimeout(() => {
    if (openCardId) openCard(openCardId);
  }, 150);
}

function connect() {
  /* A live/connecting stream is fine; a CLOSED one (e.g. died silently on sleep,
     with no onerror) must be replaced or the board stays frozen. */
  if (es && es.readyState !== EventSource.CLOSED) return;
  if (es) { try { es.close(); } catch {} es = null; }
  es = new EventSource(`/api/events?since=${cursor}`);
  es.onopen = () => $("liveDot").classList.add("live");
  /* EventSource auto-retries only while CONNECTING; a CLOSED stream (HTTP error
     during a server restart, laptop sleep, a dropped connection) is terminal and
     never revives itself. Since the board is push-only with no polling fallback,
     that silently freezes it. Tear the dead stream down and reconnect with a short
     backoff, then refresh() to catch any moves missed while we were dark. */
  es.onerror = () => {
    $("liveDot").classList.remove("live");
    if (es && es.readyState === EventSource.CLOSED) {
      try { es.close(); } catch {}
      es = null;
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => { connect(); refresh(); }, 2000);
    }
  };
  es.onmessage = msg => {
    cursor = Math.max(cursor, Number(msg.lastEventId) || 0);
    const ev = JSON.parse(msg.data);
    /* refresh when the event touches this board — or when we can't tell */
    const relevant = !ev.board_id || ev.board_id === boardId || ev.entity !== "board";
    if (relevant) {
      scheduleRefresh();
      scheduleOpenCardRefresh();
    }
    /* agent let go of the card we're tailing -> its session is done, stop live polling */
    if (logCardId && ev.entity_id === logCardId && ev.op === "released") stopLogPolling();
  };
}

function relLabel(r, id) {
  /* kind describes from relative to to: PARENT = from is the parent of to */
  if (r.kind === "parent") return r.from_card === id ? "subcard" : "parent";
  if (r.kind === "child")  return r.from_card === id ? "parent" : "subcard";
  return r.kind.replace("_", " ");
}

function reportText(v) {
  if (v == null) return "";
  if (typeof v === "string") return v;
  if (typeof v === "object") {
    return v.text || v.summary || v.result || v.verdict || "";
  }
  return String(v);
}

function renderReportList(title, rows, cardId, kind) {
  if (!Array.isArray(rows) || !rows.length) return "";
  return reportSection(kind, title, rows.map(r => {
    const status = r.status ? `<span class="chip">${esc(r.status)}</span>` : "";
    const sev = r.severity ? `<span class="chip">${esc(r.severity)}</span>` : "";
    const open = kind === "questions" && (r.title || r.text) && r.status !== "answered" && r.status !== "canceled";
    const evidence = r.evidence ? `<div style="color:var(--dim);margin-top:4px">${md(r.evidence)}</div>` : "";
    const answer = r.answer ? `<div style="margin-top:5px"><b>Answer:</b> ${md(r.answer)}</div>` : "";
    const answerBox = open ? `<div class="answerBox">
      <input type="text" id="ans-${esc(r.id)}" placeholder="answer ${esc(r.id)}">
      <button type="button" onclick="answerQuestion('${esc(cardId)}','${esc(r.id)}')">Answer</button>
    </div>` : "";
    // Render extra fields (beyond id/status/severity/evidence/answer) as mini key-value grid
    const known = new Set(["id", "status", "severity", "evidence", "answer", "text", "summary", "result", "verdict"]);
    const extras = Object.entries(r).filter(([k, v]) => !known.has(k) && v != null && v !== "" && !(Array.isArray(v) && v.length === 0));
    const extraHtml = extras.length
      ? `<div class="objGrid" style="margin-top:4px">${extras.map(([k, v]) => {
          const label = esc(k.replace(/_/g, " "));
          const val = typeof v === "string" ? md(v) : Array.isArray(v)
            ? v.map(i => typeof i === "string" ? esc(i) : renderInlineItem(i)).join("<br>")
            : esc(JSON.stringify(v, null, 1).slice(0, 200));
          return `<span class="objKey">${label}</span><span class="objVal">${val}</span>`;
        }).join("")}</div>`
      : "";
    return `<div class="reportItem${open ? " open" : ""}">
      <div><span class="rid">${esc(r.id || "")}</span> ${status} ${sev}</div>
      <div>${md(reportText(r))}</div>${evidence}${answer}${answerBox}${extraHtml}
    </div>`;
  }).join(""));
}

function renderInlineItem(v) {
  if (typeof v === "string") return esc(v);
  const txt = v.text || v.note || v.title || JSON.stringify(v).slice(0, 120);
  return esc(txt);
}

const REPORT_SECTION_LABELS = {
  about: "About",
  questions: "Questions",
  findings: "Findings",
  plan: "Plan",
  needs: "Needs",
  checks: "Checks",
  analysis_log: "Analysis",
  verdict: "Verdict",
  handoff: "Handoff",
};

/* --- collapsed work-report sections (client-only, persisted in localStorage) ---
   Keyed by SECTION, not by card: collapse "Analysis" once and it stays collapsed on every
   card you open — the point is to hide a section you don't care to read, and that preference
   is about the section, not about one card. */
const REPORT_COLLAPSE_KEY = "kanban-pro-report-collapsed";
function collapsedSections() {
  try { return new Set(JSON.parse(localStorage.getItem(REPORT_COLLAPSE_KEY)) || []); } catch { return new Set(); }
}
function toggleReportSection(kind) {
  const collapsed = collapsedSections();
  collapsed.has(kind) ? collapsed.delete(kind) : collapsed.add(kind);
  localStorage.setItem(REPORT_COLLAPSE_KEY, JSON.stringify([...collapsed]));
  for (const el of document.querySelectorAll(`.reportSec[data-sec="${CSS.escape(kind)}"]`)) {
    el.classList.toggle("collapsed", collapsed.has(kind));
  }
}
function reportSection(kind, title, body) {
  const key = kind || "unknown";
  const isCollapsed = collapsedSections().has(key);  // applied at render time, so no flash on open
  return `<section class="reportSec${isCollapsed ? " collapsed" : ""}" data-sec="${esc(key)}">`
    + `<h4 class="hdr-${esc(key)}" onclick="toggleReportSection('${esc(key)}')" title="click to collapse">`
    + `<span class="secCaret">▾</span>${esc(title)}</h4>`
    + `<div class="secBody">${body}</div></section>`;
}

function isReportSectionEmpty(value) {
  if (value === null || value === undefined || value === "") return true;
  if (Array.isArray(value)) return value.length === 0;
  if (typeof value === "object") return Object.keys(value).length === 0;
  return false;
}

function renderReportValue(title, value, cardId, kind) {
  if (isReportSectionEmpty(value)) return "";
  if (Array.isArray(value)) return renderReportList(title, value, cardId, kind);
  if (typeof value === "object" && value !== null)
    return renderReportObject(title, value, kind);
  return reportSection(kind, title, md(reportText(value)));
}

function renderReportObject(title, obj, kind) {
  const rows = Object.entries(obj).map(([k, v]) => {
    const label = esc(k.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()));
    const isLink = k.endsWith("_link") || k.endsWith("_url");
    const val = typeof v === "string"
      ? (isLink
        ? `<a href="${esc(v)}" target="_blank" rel="noopener" class="mrLink">Open MR →</a>`
        : md(v))  // md() already autolinks — linkifying its OUTPUT re-matched the URL inside
                  // the href it had just written, nesting <a> inside <a>

      : esc(JSON.stringify(v, null, 2));
    return `<div class="objRow"><span class="objKey">${label}</span><span class="objVal">${val}</span></div>`;
  }).join("");
  return reportSection(kind, title, `<div class="objGrid">${rows}</div>`);
}

function reportRequiredFor(card) {
  const out = new Set();
  for (const assignee of (card.assignees || [])) {
    const raw = String(assignee);
    const bare = raw.split(":").pop();
    for (const key of [raw, bare, "agent:" + bare]) {
      for (const section of (reportRequiredByAssignee[key] || [])) out.add(section);
    }
  }
  return [...out];
}

function reportSectionOrderFor(card) {
  for (const assignee of (card.assignees || [])) {
    const raw = String(assignee);
    const bare = raw.split(":").pop();
    for (const key of [raw, bare, "agent:" + bare]) {
      const order = reportSectionOrderByAssignee[key];
      if (Array.isArray(order) && order.length) return order;
    }
  }
  return reportSectionOrder.length ? reportSectionOrder : Object.keys(REPORT_SECTION_LABELS);
}

function renderWorkReport(report, cardId, requiredSections = [], sectionOrder = Object.keys(REPORT_SECTION_LABELS)) {
  report = report && typeof report === "object" ? report : {};
  const contentKeys = Object.keys(report).filter(k => !k.startsWith("_"));  // `_v` isn't content
  if (!contentKeys.length && !requiredSections.length) return "";
  const parts = [];
  const missing = requiredSections.filter(section => isReportSectionEmpty(report[section]));
  if (missing.length) {
    parts.push(reportSection("required", "Required by route",
      `<div style="color:var(--danger)">Missing: ${missing.map(s => esc(REPORT_SECTION_LABELS[s] || s)).join(", ")}</div>`));
  }
  const known = new Set(Object.keys(REPORT_SECTION_LABELS));
  const ordered = [...sectionOrder, ...Object.keys(REPORT_SECTION_LABELS)].filter((section, index, list) => list.indexOf(section) === index);
  for (const section of ordered) {
    parts.push(renderReportValue(REPORT_SECTION_LABELS[section], report[section], cardId, section));
  }
  for (const [section, value] of Object.entries(report)) {
    // Underscore keys are reserved report metadata (`_v` = format version), not content.
    if (!known.has(section) && !section.startsWith("_")) {
      parts.push(renderReportValue(section, value, cardId, section));
    }
  }
  const html = parts.filter(Boolean).join("");
  return html ? `<h4>Work report</h4>${html}` : "";
}

async function answerQuestion(cardId, questionId) {
  const input = $("ans-" + questionId);
  const answer = input ? input.value.trim() : "";
  if (!answer) return;
  try {
    await api(`/api/cards/${cardId}/work-report/questions/${questionId}/answer`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({answer}),
    });
    toast("answer saved");
    await openCard(cardId);
  } catch (e) { toast(e.message); }
}

async function retryCard(cardId) {
  try {
    await api(`/api/cards/${cardId}/retry`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({resolution: "retry requested from UI"}),
    });
    toast("moved to ready");
    await refresh();
    await openCard(cardId);
  } catch (e) { toast(e.message); }
}

function boldAgent(name) {
  return name.replace(/(agent:[\w-]+)/g, (m) => {
    const w = m.replace("agent:", "");
    const glyph = ASSIGNEE_GLYPHS[w] || "";
    return `${glyph}<b>${m}</b>`;
  });
}

function formatComment(body) {
  const lines = body.split("\n");
  let inJson = false;
  return lines.map(line => {
    const trimmed = line.trim();
    // Hide fenced JSON blocks (review_checklist, handoff etc)
    if (trimmed === "```json" || trimmed === "```") { inJson = !inJson; return ""; }
    if (inJson) return "";
    // JSON on a single line (legacy format)
    if (trimmed.startsWith("{") && trimmed.endsWith("}")) return "";
    // Agents write comments in markdown (**bold**, `code`, [links]) — render it, don't print
    // the asterisks. mdInline takes already-escaped HTML and also autolinks bare URLs, so it
    // subsumes linkify; using both would double-wrap the URLs it just linked.
    // §keyword lines
    if (trimmed.startsWith("§")) {
      const m = trimmed.match(/^§(\w+)\s*(.*)/);
      if (m) return `<span class="badge badge-${esc(m[1])}">${esc(m[1])}</span> ${mdInline(esc(m[2]))}`;
    }
    // [gate] lines
    const gate = trimmed.match(/^\[(\S+)\]\s+(.*)/);
    if (gate) return `<span class="gateLabel">${esc(gate[1])}</span><span class="gateVal">${mdInline(esc(gate[2]))}</span>`;
    return mdInline(esc(line));
  }).filter(l => l !== "").join("<br>");
}

async function openCard(id) {
  openCardId = id;
  const [d, trans, activity] = await Promise.all([
    api(`/api/cards/${id}`),
    // board_id is required for a card shared onto several boards: its legal moves depend on
    // which board you're moving it ON, and this view is one board.
    api(`/api/cards/${id}/transitions?board_id=${encodeURIComponent(boardId)}`).catch(() => null),
    api(`/api/cards/${id}/activity`).catch(() => []),
  ]);
  const card = d.card;
  $("dlgTitle").textContent = card.title;

  const scheme = trans ? (trans.resolved_scheme || "backend workflow") : "?";
  $("dlgMeta").textContent = `${card.id} · scheme: ${scheme}` + (card.archived ? " · ARCHIVED" : "");

  const att = (card.ext || {})["kanban_pro.attention"];
  $("dlgAttention").innerHTML = att
    ? `<div class="attention">⚠️ <b>needs attention</b> — ${esc(att.reason)}<br>
       <span style="color:var(--dim)">raised by ${esc(att.raised_by || "?")}${att.for ? " · for " + esc(att.for) : ""}</span></div>`
    : "";

  const fmt = ts => ts ? new Date(ts).toLocaleString() : "—";
  const provenance = (card.ext || {})["kanban_pro.migrated_from"];

  /* `kanban_pro.origin` = {id, url} — PROVENANCE, not state: where this card came from, in
     whatever system that was (Jira, GitHub, Linear, a doc). Deliberately system-agnostic and
     self-contained: the card carries its own url, so kanban-pro needs no per-tracker config
     and knows nothing about any tracker.

     We LINK and never fetch. Showing the origin's live status would make kanban-pro a client
     of a system it doesn't own (transport, auth, cache, staleness), and a cached status badge
     is a stale lie that reads as authoritative. The origin's own UI is one click away and is
     always right. */
  const origin = (card.ext || {})["kanban_pro.origin"];
  function originHtml(o) {
    const id = String(o.id ?? "");
    const url = typeof o.url === "string" ? o.url : "";
    if (!/^https?:\/\//i.test(url)) return esc(id);  // only ever link http(s) — no javascript:
    return `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(id || url)} ↗</a>`;
  }

  /* assignee picker: dropdown from knownAssignees, saves on change.
     knownAssignees comes from the dispatcher's routing table, so a card can legitimately
     carry an assignee that is NOT in it (an ad-hoc role, a route in another config, a lane
     mid-rename). Such a value MUST still appear, and appear selected: without its own option
     the browser falls back to the first one ("— unassigned —"), which both misreports the
     card AND silently wipes the real assignee the moment the dialog is saved. */
  function assigneeHtml() {
    const current = (card.assignees || [])[0] || "";
    if (!knownAssignees.length) return esc(current || "unassigned");
    const known = knownAssignees.slice();
    if (current && !known.includes(current)) known.push(current);
    const opts = known.map(a =>
      `<option value="${esc(a)}"${a === current ? " selected" : ""}>${ASSIGNEE_GLYPHS[a] || ""}${esc(a)}${knownAssignees.includes(a) ? "" : " (unknown)"}</option>`
    );
    opts.unshift(`<option value=""${!current ? " selected" : ""}>— unassigned —</option>`);
    return `<select id="dlgAssignee">${opts.join("")}</select>`;
  }

  const colId = (trans && trans.current_column_id ? trans.current_column_id : (card.placements[0] || {}).column_id) || "";
  // resolve the lane by id against the board — a native column id is a uuid, so splitting it
  // on ":" (the hermes shape) printed the raw uuid at the user. Fall back to the id only if the
  // board hasn't loaded.
  const colObj = (lastBoard ? lastBoard.columns : []).find(c => c.id === colId);
  const colName = colObj ? colObj.name : (colId.includes(":") ? colId.split(":").pop() : colId);
  const colHue = colObj ? laneHue(colObj) : 260;
  const rows = [
    ["assignees", assigneeHtml(), true],
    ["column", `<span class="lanePill" style="--lane-h:${colHue}">${esc(colName)}</span>`, true],
    ["created", fmt(card.created_at)], ["updated", fmt(card.updated_at)],
  ];
  if (origin && typeof origin === "object") rows.push(["origin", originHtml(origin), true]);
  if (provenance) rows.push(["migrated from", provenance]);
  const work = (card.ext || {}).work;
  if (work && work.attempts) {
    const exhausted = work.attempts >= maxRetries;
    const warn = exhausted ? ` <span style="color:var(--danger);font-weight:600">⚠️ exhausted (${work.attempts}/${maxRetries})</span>` : "";
    rows.push(["dispatch attempts", String(work.attempts) + warn, true]);
  }
  if (work && work.retry_at) rows.push(["retry at", new Date(work.retry_at * 1000).toLocaleString()]);
  const sess = (card.ext || {}).session || {};
  const running = !!d.claim;   // a live claim == an agent is working it right now
  if (d.claim) rows.push(["claimed by", `${d.claim.owner} · lease until ${fmt(d.claim.expires_at)}`]);
  if (sess.log || (work && work.log))
    rows.push(["session log",
      `<button class="linkbtn" onclick="openLog('${esc(id)}', ${running})">${running ? "▶ watch live" : "view log"} ↗</button>`, true]);
  if (att) rows.push(["action", `<button type="button" onclick="retryCard('${esc(id)}')">Retry</button>`, true]);
  const hermes = (card.ext || {}).hermes;
  if (card.priority) rows.push(["priority", `${card.priority} / 10`]);
  else if (hermes && hermes.priority != null) rows.push(["priority", String(hermes.priority)]);
  $("dlgGrid").innerHTML = rows.map(([k, v, raw]) =>
    `<span class="mi${k === "assignees" || k === "session log" ? " wide" : ""}"><span class="mk">${esc(k)}</span><span class="mv" title="${esc(String(v).replace(/<[^>]*>/g, ""))}">${raw ? v : esc(v)}</span></span>`).join("");
  /* wire up assignee dropdown (only present when knownAssignees is non-empty) */
  const dlgAssign = $("dlgAssignee");
  if (dlgAssign) dlgAssign.onchange = async () => {
    const assignees = dlgAssign.value ? [dlgAssign.value] : [];
    try {
      await api(`/api/cards/${id}`, {
        method: "PATCH", headers: {"content-type": "application/json"},
        body: JSON.stringify({assignees}),
      });
      toast("assignee saved");
    } catch (e) { toast(e.message); }
  };

  /* Every lane is shown — legal targets lit in the lane's hue, illegal ones dashed and dimmed.
     Hiding the illegal ones hides the FLOW: you could never see why a move wasn't offered. A
     dashed lane is still clickable with ⌘/Ctrl to force, which is audited (forced: true). */
  $("dlgMoves").innerHTML = "";
  document.querySelectorAll("#cardDlg .buildInfo").forEach(el => el.remove());
  const legal = new Set((trans ? trans.options : []).map(o => o.column_id));
  const here = (card.placements || []).find(p => p.board_id === boardId);
  const move = async (colId, force) => {
    try {
      await api(`/api/cards/${id}/move`, { method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({to_board_id: boardId, to_column_id: colId, position: 0, force}) });
      if (force) toast("forced — recorded in the change-log as forced");
    } catch (e) { toast(e.message); }
  };
  for (const col of (lastBoard ? [...lastBoard.columns].sort((a, b) => a.order - b.order) : [])) {
    if (here && col.id === here.column_id) continue;         // it's already here
    const ok = legal.has(col.id);
    const b = document.createElement("button");
    b.className = ok ? "" : "illegal";
    b.style.setProperty("--lane-h", laneHue(col));
    b.title = ok ? `Move to ${col.name}` : "Not allowed by this board's flow — ⌘/Ctrl-click to force";
    b.innerHTML = `<span class="cdot"></span>${esc(col.name)}`;
    b.onclick = ev => {
      if (ok) return move(col.id, false);
      if (ev.metaKey || ev.ctrlKey) return move(col.id, true);
      toast(`flow forbids → ${col.name}. ⌘/Ctrl-click to force (it will be logged as forced).`);
    };
    $("dlgMoves").appendChild(b);
  }
  if (trans && trans.note) {
    const n = document.createElement("span");
    n.style.cssText = "color:var(--dim);font-size:11px;align-self:center";
    n.textContent = trans.note;
    $("dlgMoves").appendChild(n);
  }

  const desc = card.description || "";
  $("dlgDesc").innerHTML = desc.trim().startsWith("```json") ? "" : md(desc);
  $("dlgDesc").style.display = $("dlgDesc").innerHTML ? "" : "none";
  $("dlgWorkReport").innerHTML = renderWorkReport((card.ext || {}).work_report, id, reportRequiredFor(card), reportSectionOrderFor(card));

  /* Build info (surfaced from ext — visible without opening raw ext) */
  const ext = card.ext || {};
  const buildRows = [];
  if (ext.verify) buildRows.push(`<dt>verify</dt><dd>${esc(ext.verify)}</dd>`);
  if (ext.branch) buildRows.push(`<dt>branch</dt><dd>${esc(ext.branch)}</dd>`);
  if (ext.diffstat) buildRows.push(`<dt>diffstat</dt><dd style="white-space:pre-wrap">${esc(ext.diffstat)}</dd>`);
  if (ext.changes && Array.isArray(ext.changes)) buildRows.push(`<dt>changes</dt><dd>${esc(ext.changes.join("; "))}</dd>`);
  if (ext.notes) buildRows.push(`<dt style="color:var(--danger)">notes</dt><dd style="color:var(--danger)">${esc(ext.notes)}</dd>`);
  if (buildRows.length) {
    const sec = document.createElement("div");
    sec.className = "buildInfo";
    sec.innerHTML = `<h4>Build</h4><dl class="metaGrid">${buildRows.join("")}</dl>`;
    $("dlgMoves").after(sec);
  }

  $("dlgRelations").innerHTML = (d.relations || []).length
    ? `<h4>Relations</h4>` + d.relations.map(r =>
        `<div class="relRow">${esc(relLabel(r, id))}: <a onclick="openCard('${esc(r.other_id)}')">${esc(r.other_title)}</a></div>`
      ).join("")
    : "";

  $("dlgComments").innerHTML = d.comments.map(c =>
    `<div class="comment"><div class="who">${boldAgent(esc(c.author))} · ${c.created_at ? new Date(c.created_at).toLocaleString() : ""}</div>${formatComment(c.body)}</div>`
  ).join("") || `<div class="comment" style="color:var(--dim)">no comments</div>`;

  $("dlgActivity").innerHTML = [...activity].reverse().map(e => {
    const what = e.data && e.data.forced
      ? `<span class="forced">forced move → ${esc(e.data.column_id || "")}</span>`
      : `${esc(e.entity)}.${esc(e.op)}` + (e.data && e.data.column_id ? ` → ${esc(String(e.data.column_id).split(":").pop())}` : "")
        + (e.data && e.data.reason ? ` — ${esc(e.data.reason)}` : "");
    return `<div class="ev"><span class="t">${new Date(e.ts).toLocaleString()}</span>
            <span class="who">${boldAgent(esc(e.actor))}</span><span>${what}</span></div>`;
  }).join("") || `<div style="color:var(--dim)">no recorded activity</div>`;

  $("dlgExt").style.display = Object.keys(ext).length ? "" : "none";
  $("dlgExtPre").textContent = JSON.stringify(ext, null, 2);

  renderTabs(id, {
    report: !!(ext.work_report && Object.keys(ext.work_report).length),
    spec: !!$("dlgDesc").innerHTML,
    session: !!((ext.session || {}).log || (ext.work || {}).log),
    live: !!d.claim,
    comments: d.comments.length,
    activity: activity.length,
  });

  const dlg = $("cardDlg");
  if (!dlg.open) {
    dlg.showModal();
    // some browsers still focus the first control despite `autofocus` on the dialog
    if (document.activeElement && document.activeElement !== dlg) document.activeElement.blur();
    dlg.focus();
  }
}
$("cardDlg").addEventListener("close", () => {
  openCardId = null;
  if (logTarget === $("dlgSessionLog")) { clearInterval(logTimer); logTimer = null; logCardId = null; logTarget = null; }
  clearTimeout(detailRefreshTimer);
  detailRefreshTimer = null;
});

/* --- the detail tabs -----------------------------------------------------------------
   Each tab keeps its own hue (report=blue, spec=violet, session=green, comments=teal,
   activity=amber) so the strip reads as a set of places, not five identical words. A tab
   with nothing in it is shown but dimmed — absence is information ("no work report yet"),
   whereas hiding the tab would just look like the feature doesn't exist. */
const TABS = [
  { id: "report",   pane: "paneReport",   label: "Work report", hue: 250 },
  { id: "spec",     pane: "paneSpec",     label: "Spec",        hue: 305 },
  { id: "session",  pane: "paneSession",  label: "Session log", hue: 150 },
  { id: "comments", pane: "paneComments", label: "Comments",    hue: 175 },
  { id: "activity", pane: "paneActivity", label: "Activity",    hue: 70  },
];
function renderTabs(cardId, has) {
  const strip = $("dlgTabs");
  strip.innerHTML = "";
  // the default tab is the report — unless this card has none, in which case the spec is
  // what a reader actually wants first
  if (!has[activeTab] && !(activeTab === "report" && !has.report)) activeTab = "report";
  if (activeTab === "report" && !has.report && has.spec) activeTab = "spec";
  for (const t of TABS) {
    const count = t.id === "comments" ? has.comments : t.id === "activity" ? has.activity : 0;
    const b = document.createElement("button");
    b.type = "button";
    b.dataset.tab = t.id;
    b.style.setProperty("--tab-h", t.hue);
    b.style.opacity = has[t.id] ? "" : ".55";
    const live = t.id === "session" && has.live;
    b.innerHTML = `<span class="cdot${live ? " pulse" : ""}"></span>${t.label}${count ? " · " + count : ""}`;
    b.onclick = () => { activeTab = t.id; showTab(cardId); };
    strip.appendChild(b);
  }
  showTab(cardId);
}
function showTab(cardId) {
  for (const t of TABS) $(t.pane).hidden = t.id !== activeTab;
  for (const b of $("dlgTabs").children) b.classList.toggle("on", b.dataset.tab === activeTab);
  if (activeTab === "session") tailSessionInto(cardId);   // only tail while the tab is open
}

/* --- session-log viewer: tail an agent's log; live-poll while its claim is held ---
   The same tail now feeds two surfaces: the Session tab inside the card dialog (the design's
   home for it) and the standalone pop-out. `logTarget` says which element is receiving it. */
let logCardId = null, logOffset = 0, logTimer = null, logTarget = null;

/* Render the session log INTO the card dialog's Session tab. */
async function tailSessionInto(cardId) {
  const view = $("dlgSessionLog"), meta = $("dlgSessionMeta");
  if (logCardId === cardId && logTarget === view) return;   // already tailing this one
  clearInterval(logTimer); logTimer = null;
  logCardId = cardId; logOffset = 0; logTarget = view;
  view.innerHTML = "";
  let d;
  try { d = await api(`/api/cards/${cardId}`); } catch { d = {}; }
  const ext = (d.card || {}).ext || {};
  const running = !!d.claim;
  const owner = running ? d.claim.owner : (ext.session || {}).actor;
  if (!((ext.session || {}).log || (ext.work || {}).log)) {
    meta.innerHTML = "";
    view.innerHTML = `<div class="emptyPane"><div class="glyph">⏸</div>
      <div class="lead">No session has run for this card yet</div>
      <div class="sub">When a worker claims it, its transcript tails here live.</div></div>`;
    return;
  }
  meta.innerHTML = `<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
      ${owner ? agentChip(owner) : ""}
      <span style="margin-left:auto;font-size:11px;font-weight:600;color:${running ? "var(--ok)" : "var(--dim)"}">
        ${running ? "▶ streaming live" : "last session · ended"}
      </span>
    </div>`;
  await pollLog(true);
  if (running) logTimer = setInterval(() => pollLog(false), 2000);
}

function logEntryEl(e) {
  const div = document.createElement("div");
  div.className = "le " + (e.kind || "") + " " + (e.role || "");
  /* plain .log lines carry no useful role — label call/result, drop the rest;
     transcript entries keep role (+ kind suffix for tool/thinking). */
  let label;
  if (e.role === "log") label = { tool_use: "→ call", tool_result: "← result" }[e.kind] || "";
  else label = e.role + (e.kind && e.kind !== "text" && e.kind !== "line" ? "/" + e.kind : "");
  div.innerHTML = (label ? `<span class="role">${esc(label)}</span>` : "") + esc(e.text || "");
  return div;
}
function setLogLive(running) {
  const b = $("logLive");
  if (!b) return;                       // the Session tab has its own status line, not this badge
  b.textContent = running ? "LIVE" : "done";
  b.className = running ? "live" : "done";
}
function stopLogPolling() { clearInterval(logTimer); logTimer = null; setLogLive(false); }

async function pollLog(initial) {
  if (!logCardId) return;
  let data;
  try {
    data = await api(`/api/cards/${logCardId}/session-log?after=${initial ? -1 : logOffset}`);
  } catch (e) {
    stopLogPolling();
    const v = logTarget || $("logView");
    if (initial && v) v.innerHTML = `<div class="le">could not load log — ${esc(e.message)}</div>`;
    return;
  }
  const view = logTarget || $("logView");
  const atBottom = view.scrollHeight - view.scrollTop - view.clientHeight < 40;
  for (const e of data.entries) view.appendChild(logEntryEl(e));
  logOffset = data.eof_offset;
  if (initial && !data.entries.length) view.innerHTML = `<div class="le">log is empty</div>`;
  if (atBottom || initial) view.scrollTop = view.scrollHeight;
}

async function openLog(id, running) {
  logCardId = id; logOffset = 0; logTarget = $("logView");
  clearInterval(logTimer); logTimer = null;
  $("logView").innerHTML = "";
  setLogLive(running);
  const dlg = $("logDlg");
  if (!dlg.open) dlg.showModal();
  await pollLog(true);
  if (running) logTimer = setInterval(() => pollLog(false), 2000);
}
$("logClose").onclick = () => $("logDlg").close();
$("logDlg").addEventListener("close", () => { clearInterval(logTimer); logTimer = null; logCardId = null; });
$("commentForm").addEventListener("submit", async ev => {
  ev.preventDefault();
  const body = $("commentBody").value.trim();
  if (!body || !openCardId) return;
  try {
    await api(`/api/cards/${openCardId}/comments`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({body}),
    });
    $("commentBody").value = "";
  } catch (e) { toast(e.message); }
});

/* Heal a stale board after the common freeze triggers — a backgrounded tab or a
   laptop that slept often kills the EventSource without a clean onerror. On regaining
   focus / connectivity, refresh() re-fetches the snapshot and (via connect()) revives
   a dead stream, so the board can't silently sit frozen on old lanes. */
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });
window.addEventListener("online", refresh);

(async () => {
  try { initFilters(); await loadMeta(); await loadBoards(); await refresh(); }
  catch (e) { toast(e.message); }
})();
</script>
</body>
</html>
