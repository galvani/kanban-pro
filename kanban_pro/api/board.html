            : /fail|needs-fix|reject/.test(st) ? "failed"
            : /pass|ok|approve/.test(st) ? "passed" : "";
  const meta = OUTCOME[key];
  // don't say the same word twice: the pill already carries the verdict when they agree
  const echoes = meta && meta.label.toLowerCase() === st;
  return reportSection(kind, title,
    `<div class="rpVerdict">${pill(meta, status)}
       ${echoes ? "" : `<span class="rpStatus">${esc(status)}</span>`}</div>
     ${summary ? `<div class="rpBody">${md(String(summary))}</div>` : ""}`);
}

/* A TYPED renderer must never be pickier than the writers it renders.
   This one read `title|summary` + `scenario|evidence` and nothing else — so a finding written as
   `{id, severity, text}` (the reviewer's shape) drew its pill and its id and then a blank row, and
   a `{id, summary, detail}` finding (the analyst's shape) silently lost the detail. The report was
   complete the whole time; the reader was not. `body` therefore falls back across every field the
   fleet actually writes, and `_unrendered` catches whatever it still doesn't know rather than
   dropping it on the floor — a report you cannot read is indistinguishable from work not done. */
const FINDING_HEAD = new Set(["id", "severity", "sev", "concern", "category", "file", "line",
                              "title", "summary", "text", "detail", "scenario", "evidence",
                              "fix", "rule"]);
/* A finding that has been FIXED is not a finding any more — it is a receipt. Left looking
   identical to the open ones, it makes a card read as if nothing was done, and the next agent
   re-derives (or re-fixes) work that is already merged. Struck through and dimmed: still there,
   still auditable, visibly closed. */
const FIXED = /^(fixed|resolved|done|applied|closed|pass(ed)?)$/i;
function renderFindings(title, rows, kind) {
  const open = rows.filter(f => !FIXED.test(String(f.status || ""))).length;
  const tally = `<div class="rpTally">${open} open · ${rows.length - open} fixed</div>`;
  return reportSection(kind, title, tally + rows.map(f => {
    const fixed = FIXED.test(String(f.status || ""));
    const sev = SEV[String(f.severity || f.sev || "").toLowerCase()];
    const loc = f.file ? `${f.file}${f.line ? ":" + f.line : ""}` : "";
    const head = f.title || f.summary || "";
    // the long-form content, under whichever name its author used
    const body = f.detail || f.text || f.scenario || f.evidence || (head ? "" : reportText(f));
    const extra = Object.entries(f).filter(([k, v]) =>
      !FINDING_HEAD.has(k) && v != null && v !== "" && !(Array.isArray(v) && !v.length));
    return `<div class="rpFinding${fixed ? " fixed" : ""}" style="--f-h:${fixed ? 150 : (sev ? sev.h : 260)}">
      <div class="rpFindHead">
        ${fixed ? `<span class="rpPill" style="--p-h:150">FIXED</span>` : pill(sev, f.severity || "finding")}
        ${f.concern || f.category ? `<span class="rpTag">${esc(f.concern || f.category)}</span>` : ""}
        ${f.id ? `<span class="rpId">${esc(f.id)}</span>` : ""}
        ${loc ? `<span class="rpLoc">${esc(loc)}</span>` : ""}
      </div>
      ${head ? `<div class="rpFindTitle">${esc(head)}</div>` : ""}
      ${body ? `<div class="rpBody${head ? " dim" : ""}">${md(String(body))}</div>` : ""}
      ${f.fix ? `<div class="rpFix"><b>fix · </b>${md(String(f.fix))}</div>` : ""}
      ${f.rule ? `<div class="rpRule"><b>rule · </b>${esc(f.rule)}</div>` : ""}
      ${extra.length ? `<div class="objGrid" style="margin-top:4px">${extra.map(([k, v]) =>
          `<span class="objKey">${esc(k.replace(/_/g, " "))}</span><span class="objVal">${
            typeof v === "string" ? md(v)
            : Array.isArray(v) ? v.map(i => typeof i === "string" ? esc(i) : renderInlineItem(i)).join("<br>")
            : esc(JSON.stringify(v))}</span>`).join("")}</div>` : ""}
    </div>`;
  }).join(""));
}

/* Checks ARE a checklist — the schema says so (`list[{id, name, status, evidence?}]`) — so draw
   one: a box you can read at a glance. An un-run check gets the amber ⚠, not a neutral grey tick:
   it is a hole in the verification, and rendering it like "skipped, fine" is how a pass verdict
   sitting on unproven checks slips through. */
/* NB: distinct from renderChecks(card.checks) above — that one draws the card's VERIFICATION
   CONTRACT (which gates the flow); this draws the work report's narrative `checks` section. */
function renderReportChecks(title, rows, kind) {
  const pass = rows.filter(c => checkPassed(c.status || c.outcome)).length;
  const head = `<div class="rpTally">${pass}/${rows.length} passed</div>`;
  return reportSection(kind, title, head + `<div class="rpChecks">` + rows.map(c => {
    const out = String(c.outcome || c.status || c.result || "").toLowerCase();
    const ok = checkPassed(out), bad = checkFailed(out);
    const box = ok ? "✓" : bad ? "✗" : "⚠";
    const state = ok ? "ok" : bad ? "bad" : "unrun";
    return `<div class="rpCheck ${state}">
      <span class="rpBox">${box}</span>
      <div class="rpCheckBody">
        <div class="rpCheckName">${esc(c.name || c.id || "")}</div>
        ${c.details || c.evidence ? `<div class="rpBody dim">${md(String(c.details || c.evidence))}</div>` : ""}
      </div>
      ${pill(OUTCOME[out], out || "not run")}
    </div>`;
  }).join("") + `</div>`);
}

/* The plan is a checklist too (`status: todo|doing|done|blocked`), and rendering it as prose left
   you unable to tell whether a step was ABOUT to happen or had already happened. */
const PLAN_STATE = {
  done:    { box: "✓", cls: "ok",    label: "done" },
  doing:   { box: "▶", cls: "doing", label: "in progress" },
  blocked: { box: "⚠", cls: "bad",   label: "blocked" },
  todo:    { box: "☐", cls: "todo",  label: "to do" },
};
/* Flatten the plan into ONE ROW PER STEP.

   The schema says `plan: [{id, text, status}]`, but what workers actually file is often a single
   item holding the whole plan in a nested `steps[]` (prepare and the builders both do it). Kept
   nested, that rendered as ONE checkbox reading "0/1 done" with four steps buried inside it — the
   tally was a lie, no step could carry its own state, and the card looked like it had no plan.
   A step is a step, whoever nested it. (Steps that came from a nested list inherit their parent's
   status, since they have none of their own — being honest about that beats inventing one.) */
function planRows(rows) {
  const out = [];
  for (const r of rows) {
    const steps = Array.isArray(r.steps) ? r.steps : null;
    if (!steps || !steps.length) { out.push(r); continue; }
    const lead = r.text || r.summary || "";
    if (lead) out.push({ ...r, text: lead, steps: null });
    for (const s of steps) {
      const text = typeof s === "string" ? s : (s.text || s.summary || reportText(s));
      out.push({
        // the strings usually start with their own "1. " — an <ol> on top gave "1. 1. …"
        text: String(text).replace(/^\s*\d+[.)]\s*/, ""),
        status: (typeof s === "object" && s.status) || r.status,
        evidence: typeof s === "object" ? s.evidence : undefined,
        _nested: true,
      });
    }
  }
  return out;
}

function renderPlan(title, rows, kind) {
  const items = planRows(rows);
  const done = items.filter(r => r.status === "done").length;
  const head = `<div class="rpTally">${done}/${items.length} done</div>`;
  return reportSection(kind, title, head + `<div class="rpChecks">` + items.map(r => {
    const st = PLAN_STATE[r.status] || PLAN_STATE.todo;
    const name = r.text || r.summary || r.id || "";
    const next = r.recommended_next || r.next || "";
    return `<div class="rpCheck ${st.cls}">
      <span class="rpBox">${st.box}</span>
      <div class="rpCheckBody">
        ${name ? `<div class="rpCheckName${r.status === "done" ? " struck" : ""}">${md(String(name))}</div>` : ""}
        ${next ? `<div class="rpBody dim"><b>next · </b>${md(String(next))}</div>` : ""}
        ${r.evidence ? `<div class="rpBody dim">${md(String(r.evidence))}</div>` : ""}
      </div>
      <span class="rpState ${st.cls}">${st.label}</span>
    </div>`;
  }).join("") + `</div>`);
}

function renderReportValue(title, value, cardId, kind) {
  if (isReportSectionEmpty(value)) return "";
  // typed sections first — the ones whose shape we actually know
  if (kind === "verdict") return renderVerdict(title, value, kind);
  if (kind === "findings" && Array.isArray(value)) return renderFindings(title, value, kind);
  if (kind === "checks" && Array.isArray(value)) return renderReportChecks(title, value, kind);
  if (kind === "plan" && Array.isArray(value)) return renderPlan(title, value, kind);
  if (Array.isArray(value)) return renderReportList(title, value, cardId, kind);
  if (typeof value === "object" && value !== null)
    return renderReportObject(title, value, kind);
  return reportSection(kind, title, md(reportText(value)));
}

/* Handoff / about rows: the values here are the things you actually want to GO to — the branch,
   the MR, the next card, the worktree. They were plain text, so a handoff told you where the
   work went and then made you copy-paste it. Anything that is a url is a link; anything that
   names a CARD opens that card; a branch/worktree/commit is click-to-copy. */
const CARD_ID_RE = /^(?:[A-Z]{2,}-\d+|t_[0-9a-f]{6,}|[0-9a-f]{16,})$/;
function handoffValue(key, v) {
  if (typeof v !== "string") return esc(JSON.stringify(v, null, 2));
  if (/^https?:\/\//i.test(v)) {
    const label = /_(link|url)$|^(mr|pr|merge_request)$/i.test(key) ? "Open MR →" : v;
    return `<a href="${esc(v)}" target="_blank" rel="noopener" class="mrLink">${esc(label)}</a>`;
  }
  if (CARD_ID_RE.test(v.trim()))
    return `<a onclick="openCard('${esc(v.trim())}')" title="open ${esc(v.trim())}">${esc(v)}</a>`;
  if (/branch|worktree|commit|sha|path/i.test(key))
    return `<code class="copyable" title="click to copy" onclick="copyText(this)">${esc(v)}</code>`;
  return md(v);   // md() already autolinks; linkifying its OUTPUT would nest <a> inside <a>
}
async function copyText(el) {
  try { await navigator.clipboard.writeText(el.textContent); toast("copied"); }
  catch { toast("clipboard blocked"); }
}

function renderReportObject(title, obj, kind) {
  const rows = Object.entries(obj).map(([k, v]) => {
    const label = esc(k.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()));
    return `<div class="objRow"><span class="objKey">${label}</span><span class="objVal">${handoffValue(k, v)}</span></div>`;
  }).join("");
  return reportSection(kind, title, `<div class="objGrid">${rows}</div>`);
}

function reportRequiredFor(card) {
  const out = new Set();
  for (const assignee of (card.assignees || [])) {
    const raw = String(assignee);
    const bare = raw.split(":").pop();
    for (const key of [raw, bare, "agent:" + bare]) {
      for (const section of (reportRequiredByAssignee[key] || [])) out.add(section);
    }
  }
  return [...out];
}

function reportSectionOrderFor(card) {
  for (const assignee of (card.assignees || [])) {
    const raw = String(assignee);
    const bare = raw.split(":").pop();
    for (const key of [raw, bare, "agent:" + bare]) {
      const order = reportSectionOrderByAssignee[key];
      if (Array.isArray(order) && order.length) return order;
    }
  }
  return reportSectionOrder.length ? reportSectionOrder : Object.keys(REPORT_SECTION_LABELS);
}

function renderWorkReport(report, cardId, requiredSections = [], sectionOrder = Object.keys(REPORT_SECTION_LABELS)) {
  report = report && typeof report === "object" ? report : {};
  const contentKeys = Object.keys(report).filter(k => !k.startsWith("_"));  // `_v` isn't content
  if (!contentKeys.length && !requiredSections.length) return "";
  const parts = [];
  const missing = requiredSections.filter(section => isReportSectionEmpty(report[section]));
  if (missing.length) {
    parts.push(reportSection("required", "Required by route",
      `<div style="color:var(--danger)">Missing: ${missing.map(s => esc(REPORT_SECTION_LABELS[s] || s)).join(", ")}</div>`));
  }
  const known = new Set(Object.keys(REPORT_SECTION_LABELS));
  const ordered = [...sectionOrder, ...Object.keys(REPORT_SECTION_LABELS)].filter((section, index, list) => list.indexOf(section) === index);
  for (const section of ordered) {
    parts.push(renderReportValue(REPORT_SECTION_LABELS[section], report[section], cardId, section));
  }
  for (const [section, value] of Object.entries(report)) {
    // Underscore keys are reserved report metadata (`_v` = format version), not content.
    if (!known.has(section) && !section.startsWith("_")) {
      parts.push(renderReportValue(section, value, cardId, section));
    }
  }
  const html = parts.filter(Boolean).join("");
  return html ? `<h4>Work report</h4>${html}` : "";
}

/* Two columns, because one narrow column of full-width panels is what made you scroll for
   everything: `about` and `handoff` are three lines each and were taking a full screen-width
   band, pushing the findings — the part you actually read — below the fold. The wide stuff
   (findings, checks, plan, the analysis log) stays in the main column; the short metadata-ish
   sections go in a side rail. */
const SIDE_SECTIONS = new Set(["about", "handoff", "needs", "questions", "required"]);
function splitReport(html) {
  const host = document.createElement("div");
  host.innerHTML = html;
  const main = document.createElement("div"), side = document.createElement("div");
  main.className = "rpMain"; side.className = "rpSide";
  for (const sec of [...host.children]) {
    if (sec.tagName === "H4") continue;                      // the "Work report" caption
    (SIDE_SECTIONS.has(sec.dataset.sec) ? side : main).appendChild(sec);
  }
  const wrap = document.createElement("div");
  wrap.className = "rpGrid" + (side.children.length ? "" : " noSide");
  wrap.append(main, side);
  return wrap;
}

async function answerQuestion(cardId, questionId) {
  const input = $("ans-" + questionId);
  const answer = input ? input.value.trim() : "";
  if (!answer) return;
  try {
    await api(`/api/cards/${cardId}/work-report/questions/${questionId}/answer`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({answer}),
    });
    toast("answer saved");
    await openCard(cardId);
  } catch (e) { toast(e.message); }
}

async function retryCard(cardId) {
  try {
    await api(`/api/cards/${cardId}/retry`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({resolution: "retry requested from UI"}),
    });
    toast("moved to ready");
    await refresh();
    await openCard(cardId);
  } catch (e) { toast(e.message); }
}

function boldAgent(name) {
  return name.replace(/(agent:[\w-]+)/g, (m) => {
    const w = m.replace("agent:", "");
    const glyph = ASSIGNEE_GLYPHS[w] || "";
    return `${glyph}<b>${m}</b>`;
  });
}

/* Comments are MARKDOWN, and agents write real markdown — `## verdict`, `### the fix`, bullet
   lists. This used to render each line with mdInline (bold/code/links only) and join with <br>,
   so every heading printed its literal `##` and the whole comment ran together as one grey wall.
   Now: the special line kinds (§badge, [gate]) are still handled line-by-line, and everything
   else is handed to md() — the block renderer — so headings, lists and paragraphs come out as
   headings, lists and paragraphs. */
function formatComment(body) {
  const lines = String(body ?? "").split("\n");
  const out = [];
  let buf = [];                       // consecutive ordinary lines -> one md() block
  const flush = () => { if (buf.length) { out.push(md(buf.join("\n"))); buf = []; } };
  let inJson = false;
  for (const line of lines) {
    const trimmed = line.trim();
    // Hide fenced JSON blocks (review_checklist, handoff etc)
    if (trimmed === "```json" || trimmed === "```") { flush(); inJson = !inJson; continue; }
    if (inJson) continue;
    // JSON on a single line (legacy format)
    if (trimmed.startsWith("{") && trimmed.endsWith("}")) continue;
    const special = specialLine(trimmed);
    if (special !== null) { flush(); out.push(special); continue; }
    buf.push(line);
  }
  flush();
  return out.join("");
}

/* §keyword and [gate] lines are a convention of ours, not markdown — they keep their own shape. */
function specialLine(trimmed) {
  if (trimmed.startsWith("§")) {
    const m = trimmed.match(/^§(\w+)\s*(.*)/);
    if (m) return `<div class="md-p"><span class="badge badge-${esc(m[1])}">${esc(m[1])}</span> ${mdInline(esc(m[2]))}</div>`;
  }
  const gate = trimmed.match(/^\[(\S+)\]\s+(.*)/);
  if (gate) return `<div class="md-p"><span class="gateLabel">${esc(gate[1])}</span><span class="gateVal">${mdInline(esc(gate[2]))}</span></div>`;
  return null;
}


async function openCard(id) {
  openCardId = id;
  const [d, trans, activity] = await Promise.all([
    api(`/api/cards/${id}`),
    // board_id is required for a card shared onto several boards: its legal moves depend on
    // which board you're moving it ON, and this view is one board.
    api(`/api/cards/${id}/transitions?board_id=${encodeURIComponent(boardId)}`).catch(() => null),
    api(`/api/cards/${id}/activity`).catch(() => []),
  ]);
  const card = d.card;
  $("dlgTitle").textContent = card.title;
  $("dlgKey").textContent = card.id;

  const scheme = trans ? (trans.resolved_scheme || "backend workflow") : "?";
  $("dlgMeta").textContent = `scheme: ${scheme}` + (card.archived ? " · ARCHIVED" : "");

  const ext = card.ext || {};
  const att = (card.ext || {})["kanban_pro.attention"];
  /* The banner used to STATE a problem and offer no way out of it: the only action (Retry) was a
     small button hidden among the meta columns, and an unanswered question sat invisible inside
     the work report. A flag that says "I am blocked on you" must show what is being asked, who is
     waiting, and the buttons that end it — right here. */
  const pendingQ = ((ext.work_report || {}).questions || []).find(q => q && !q.answer);
  if (!att) {
    $("dlgAttention").innerHTML = "";
  } else {
    const sev = att.severity || "block";
    $("dlgAttention").innerHTML = `
      <div class="attention" style="--sev-h:${SEV_HUE[sev] ?? 70}">
        <div class="attnTop">
          <span class="sevPill">${esc(sev.toUpperCase())}</span>
          <span class="attnWho">waiting on ${att.for ? agentChip(att.for) : "<b>you</b>"}</span>
          <span class="attnBy">raised by ${agentChip(att.raised_by || "?")}</span>
        </div>
        <div class="attnWhy">${esc(att.reason || "")}</div>
        ${pendingQ ? `<div class="attnQ"><b>Question</b> — ${esc(pendingQ.question || pendingQ.text || "")}</div>` : ""}
        <div class="attnActs">
          <input type="text" id="attnReply" autocomplete="off"
                 placeholder="${pendingQ ? "Answer the question…" : "Reply, then resolve…"}">
          <button type="button" class="flowBtn" id="attnSend" style="--lane-h:250"><span class="cdot"></span>${pendingQ ? "Answer" : "Comment"}</button>
          <button type="button" class="flowBtn" id="attnResolve" style="--lane-h:150"><span class="cdot"></span>Resolve</button>
          <button type="button" class="flowBtn" id="attnRetry" style="--lane-h:70" title="clear the flag, reset attempts and send the card back to ready"><span class="cdot"></span>Retry</button>
        </div>
      </div>`;
    const reply = $("attnReply");
    const send = async () => {
      const text = reply.value.trim();
      if (!text) return toast("nothing to send");
      try {
        // an unanswered question is answered INTO the work report — that is where the agent
        // reads it; a plain comment would be shouting into a channel it never checks
        if (pendingQ) {
          await api(`/api/cards/${id}/work-report/questions/${encodeURIComponent(pendingQ.id)}/answer`,
            { method: "POST", headers: {"content-type": "application/json"},
              body: JSON.stringify({ answer: text }) });
        } else {
          await api(`/api/cards/${id}/comments`, { method: "POST",
            headers: {"content-type": "application/json"}, body: JSON.stringify({ body: text }) });
        }
        reply.value = "";
        toast(pendingQ ? "answer recorded on the work report" : "comment added");
        openCard(id);
      } catch (e) { toast(e.message); }
    };
    $("attnSend").onclick = send;
    reply.addEventListener("keydown", ev => { if (ev.key === "Enter") { ev.preventDefault(); send(); } });
    $("attnResolve").onclick = async () => {
      try {
        await api(`/api/cards/${id}/attention/clear`, { method: "POST",
          headers: {"content-type": "application/json"}, body: JSON.stringify({}) });
        toast("attention cleared");
      } catch (e) { toast(e.message); }
    };
    $("attnRetry").onclick = () => retryCard(id);
  }

  const fmt = ts => ts ? new Date(ts).toLocaleString() : "—";
  const provenance = (card.ext || {})["kanban_pro.migrated_from"];

  /* `kanban_pro.origin` = {id, url} — PROVENANCE, not state: where this card came from, in
     whatever system that was (Jira, GitHub, Linear, a doc). Deliberately system-agnostic and
     self-contained: the card carries its own url, so kanban-pro needs no per-tracker config
     and knows nothing about any tracker.

     We LINK and never fetch. Showing the origin's live status would make kanban-pro a client
     of a system it doesn't own (transport, auth, cache, staleness), and a cached status badge
     is a stale lie that reads as authoritative. The origin's own UI is one click away and is
     always right. */
  const origin = (card.ext || {})["kanban_pro.origin"];
  function originHtml(o) {
    const id = String(o.id ?? "");
    const url = typeof o.url === "string" ? o.url : "";
    if (!/^https?:\/\//i.test(url)) return esc(id);  // only ever link http(s) — no javascript:
    return `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(id || url)} ↗</a>`;
  }

  /* Assignee: a FREE-TEXT combobox, not a closed dropdown.
     `knownAssignees` comes from the dispatcher's routing.yaml — it is the set of assignees the
     dispatcher has a ROUTE for, not the set of assignees that exist. A dropdown built from it
     made every other actor unassignable (`hermes-engineer` has no route, so it could not be
     picked at all), and it silently wiped an off-list assignee the moment the dialog saved.
     The list is now a suggestion (datalist) and any actor can be typed. */
  /* `Card.assignees` is a LIST (there is a MULTI_ASSIGNEE capability), but the editor only ever
     held one: setting a second silently replaced the first. It is now chips + a picker —
     each assignee removable, and a <select> of the routing table to add one (plus a free-text
     box, because known_assignees is the set that has a ROUTE, not the set that exists). */
  function assigneeHtml() {
    const current = card.assignees || [];
    const chips = current.map(a =>
      `<span class="asgChip" style="--chip-h:${agentHue(a)}">
         <span class="cdot"></span>${esc(a)}
         <button type="button" class="asgX" data-rm="${esc(a)}" title="unassign ${esc(a)}">✕</button>
       </span>`).join("");
    const opts = knownAssignees.filter(a => !current.includes(a))
      .map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join("");
    return `<div class="asgBox">
      ${chips || `<span class="asgNone">unassigned</span>`}
      <select id="dlgAssignAdd" title="assign another agent">
        <option value="">+ assign…</option>${opts}
        <option value="__other">other…</option>
      </select>
    </div>`;
  }

  const colId = (trans && trans.current_column_id ? trans.current_column_id : (card.placements[0] || {}).column_id) || "";
  // resolve the lane by id against the board — a native column id is a uuid, so splitting it
  // on ":" (the hermes shape) printed the raw uuid at the user. Fall back to the id only if the
  // board hasn't loaded.
  const colObj = (lastBoard ? lastBoard.columns : []).find(c => c.id === colId);
  const colName = colObj ? colObj.name : (colId.includes(":") ? colId.split(":").pop() : colId);
  const colHue = colObj ? laneHue(colObj) : 260;
  $("dlgLane").innerHTML = `<span class="lanePill" style="--lane-h:${colHue}">${esc(colName)}</span>`;
  const rows = [
    ["assignees", assigneeHtml(), true],
    ["created", fmt(card.created_at)], ["updated", fmt(card.updated_at)],
  ];
  if (origin && typeof origin === "object") rows.push(["origin", originHtml(origin), true]);
  if (provenance) rows.push(["migrated from", provenance]);
  const work = (card.ext || {}).work;
  if (work && work.attempts) {
    const exhausted = work.attempts >= maxRetries;
    const warn = exhausted ? ` <span style="color:var(--danger);font-weight:600">⚠️ exhausted (${work.attempts}/${maxRetries})</span>` : "";
    rows.push(["dispatch attempts", String(work.attempts) + warn, true]);
  }
  if (work && work.retry_at) rows.push(["retry at", new Date(work.retry_at * 1000).toLocaleString()]);
  const sess = (card.ext || {}).session || {};
  const running = !!d.claim;   // a live claim == an agent is working it right now
  if (d.claim) rows.push(["claimed by", `${d.claim.owner} · lease until ${fmt(d.claim.expires_at)}`]);
  // no "view log" button: the Session tab IS the log, and a second surface for it was one
  // click and one pop-out dialog too many.
  // Retry lives in the attention banner now, next to Answer/Resolve — one place to act, not two.
  const hermes = (card.ext || {}).hermes;
  if (card.priority) rows.push(["priority", `${card.priority} / 10`]);
  else if (hermes && hermes.priority != null) rows.push(["priority", String(hermes.priority)]);
  $("dlgGrid").innerHTML = rows.map(([k, v, raw]) =>
    `<span class="mi${k === "assignees" || k === "session log" ? " wide" : ""}"><span class="mk">${esc(k)}</span><span class="mv" title="${esc(String(v).replace(/<[^>]*>/g, ""))}">${raw ? v : esc(v)}</span></span>`).join("");
  /* multi-assignee: the whole list is PATCHed every time (assignees is a set, not a diff) */
  const saveAssignees = async list => {
    try {
      await api(`/api/cards/${id}`, {
        method: "PATCH", headers: {"content-type": "application/json"},
        body: JSON.stringify({ assignees: list }),
      });
      toast(list.length ? `assigned: ${list.join(", ")}` : "unassigned");
      openCard(id);                       // re-render the chips from the saved truth
    } catch (e) { toast(e.message); }
  };
  for (const x of document.querySelectorAll("#dlgGrid .asgX")) {
    x.onclick = () => saveAssignees((card.assignees || []).filter(a => a !== x.dataset.rm));
  }
  const adder = $("dlgAssignAdd");
  if (adder) adder.onchange = () => {
    let v = adder.value;
    adder.value = "";
    if (!v) return;
    // an actor with no dispatcher route is still a legitimate assignee (hermes-engineer has none)
    if (v === "__other") { v = (prompt("assign to which actor?") || "").trim(); if (!v) return; }
    const list = card.assignees || [];
    if (list.includes(v)) return;
    saveAssignees([...list, v]);
  };

  /* Every lane is shown — legal targets lit in the lane's hue, illegal ones dashed and dimmed.
     Hiding the illegal ones hides the FLOW: you could never see why a move wasn't offered. A
     dashed lane is still clickable with ⌘/Ctrl to force, which is audited (forced: true). */
  $("dlgMoves").innerHTML = "";
  document.querySelectorAll("#cardDlg .buildInfo").forEach(el => el.remove());
  const legal = new Set((trans ? trans.options : []).map(o => o.column_id));
  const here = (card.placements || []).find(p => p.board_id === boardId);
  const move = async (colId, force) => {
    try {
      await api(`/api/cards/${id}/move`, { method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({to_board_id: boardId, to_column_id: colId, position: 0, force}) });
      if (force) toast("forced — recorded in the change-log as forced");
    } catch (e) { toast(e.message); }
  };
  for (const col of (lastBoard ? [...lastBoard.columns].sort((a, b) => a.order - b.order) : [])) {
    if (here && col.id === here.column_id) continue;         // it's already here
    const ok = legal.has(col.id);
    const b = document.createElement("button");
    b.className = ok ? "" : "illegal";
    b.style.setProperty("--lane-h", laneHue(col));
    b.title = ok ? `Move to ${col.name}` : "Not allowed by this board's flow — ⌘/Ctrl-click to force";
    b.innerHTML = `<span class="cdot"></span>${esc(col.name)}`;
    b.onclick = ev => {
      if (ok) return move(col.id, false);
      if (ev.metaKey || ev.ctrlKey) return move(col.id, true);
      toast(`flow forbids → ${col.name}. ⌘/Ctrl-click to force (it will be logged as forced).`);
    };
    $("dlgMoves").appendChild(b);
  }
  if (trans && trans.note) {
    const n = document.createElement("span");
    n.style.cssText = "color:var(--dim);font-size:11px;align-self:center";
    n.textContent = trans.note;
    $("dlgMoves").appendChild(n);
  }

  const desc = card.description || "";
  $("dlgDesc").innerHTML = desc.trim().startsWith("```json") ? "" : md(desc);
  $("dlgDesc").style.display = $("dlgDesc").innerHTML ? "" : "none";
  const reportHtml = renderWorkReport((card.ext || {}).work_report, id, reportRequiredFor(card), reportSectionOrderFor(card));
  $("dlgWorkReport").innerHTML = "";
  // the contract first, the narrative second — a reader must see what was PROVEN before what
  // was claimed about it
  const checksHtml = renderChecks(card.checks);
  if (checksHtml) $("dlgWorkReport").insertAdjacentHTML("beforeend", checksHtml);
  if (reportHtml) $("dlgWorkReport").appendChild(splitReport(reportHtml));

  // the one-sentence verdict on the WHOLE card (see statusLine)
  const missingNow = reportRequiredFor(card).filter(sec => isReportSectionEmpty((ext.work_report || {})[sec]))
                                            .map(sec => REPORT_SECTION_LABELS[sec] || sec);
  const st = statusLine(card, ext, d.claim, missingNow);
  $("dlgStatus").innerHTML =
    `<div class="statusLine" style="--s-h:${st.h}">
       <span class="sdot"></span>
       <span class="stext">${esc(st.text)}</span>
       ${st.act ? `<span class="sact">needs you</span>` : ""}
       ${att ? `<button type="button" class="flowBtn" id="stClear" style="--lane-h:150"
                  title="clear the flag — the card resumes"><span class="cdot"></span>Clear attention</button>` : ""}
     </div>
     ${st.next ? `<div class="nextLine"><span class="nlabel">next</span>
        ${st.nextActor ? agentChip(st.nextActor) : ""}
        <span class="ntext">${md(String(st.next))}</span></div>` : ""}`;
  // clear the flag straight from the one-line status — the most common thing you want to do to it
  if ($("stClear")) $("stClear").onclick = async () => {
    try {
      await api(`/api/cards/${id}/attention/clear`, { method: "POST",
        headers: {"content-type": "application/json"}, body: JSON.stringify({}) });
      toast("attention cleared");
      openCard(id);
    } catch (e) { toast(e.message); }
  };

  /* Build info (surfaced from ext — visible without opening raw ext) */
  /* `ext` is declared up by the attention banner — it needs it first. */
  const buildRows = [];
  if (ext.verify) buildRows.push(`<dt>verify</dt><dd>${esc(ext.verify)}</dd>`);
  if (ext.branch) buildRows.push(`<dt>branch</dt><dd>${esc(ext.branch)}</dd>`);
  if (ext.diffstat) buildRows.push(`<dt>diffstat</dt><dd style="white-space:pre-wrap">${esc(ext.diffstat)}</dd>`);
  if (ext.changes && Array.isArray(ext.changes)) buildRows.push(`<dt>changes</dt><dd>${esc(ext.changes.join("; "))}</dd>`);
  if (ext.notes) buildRows.push(`<dt style="color:var(--danger)">notes</dt><dd style="color:var(--danger)">${esc(ext.notes)}</dd>`);
  if (buildRows.length) {
    const sec = document.createElement("div");
    sec.className = "buildInfo";
    sec.innerHTML = `<h4>Build</h4><dl class="metaGrid">${buildRows.join("")}</dl>`;
    $("dlgMoves").after(sec);
  }

  $("dlgRelations").innerHTML = (d.relations || []).length
    ? `<h4>Relations</h4>` + d.relations.map(r =>
        `<div class="relRow">${esc(relLabel(r, id))}: <a onclick="openCard('${esc(r.other_id)}')">${esc(r.other_title)}</a></div>`
      ).join("")
    : "";

  $("dlgComments").innerHTML = d.comments.map(c =>
    `<div class="comment"><div class="who">${boldAgent(esc(c.author))} · ${c.created_at ? new Date(c.created_at).toLocaleString() : ""}</div>${formatComment(c.body)}</div>`
  ).join("") || `<div class="comment" style="color:var(--dim)">no comments</div>`;

  /* Same digest as the dashboard feed — one card's history should read the same way the fleet's
     does. This is the card's OWN history, though, so nothing is suppressed as noise: the `ext`
     bookkeeping the digest drops from the dashboard is exactly what you come here to audit. */
  $("dlgActivity").innerHTML = [...activity].reverse().map(e => {
    const g = digest(e) || { label: (e.data && e.data.fields || []).join(", ") || e.op,
                             hue: 260, text: "" };
    return `<div class="ev">
      <span class="t">${new Date(e.ts).toLocaleString()}</span>
      ${agentChip(e.actor)}
      <span class="opPill" style="--op-h:${g.hue}">${esc(g.label)}</span>
      <span>${esc(g.text || "")}</span></div>`;
  }).join("") || `<div style="color:var(--dim)">no recorded activity</div>`;

  $("dlgExt").style.display = Object.keys(ext).length ? "" : "none";
  $("dlgExtPre").textContent = JSON.stringify(ext, null, 2);

  renderTabs(id, {
    // the report tab is FLAGGED when the attention flag is really about something in it: an
    // unanswered question, or a section the route requires and the worker never filed
    flagged: !!att && (!!pendingQ || !!(reportRequiredFor(card) || []).some(
      sec => !((ext.work_report || {})[sec]))),
    report: !!(ext.work_report && Object.keys(ext.work_report).length),
    spec: !!$("dlgDesc").innerHTML,
    session: !!((ext.session || {}).log || (ext.work || {}).log),
    live: !!d.claim,
    // one Discussion tab now: it has content if EITHER side does
    comments: d.comments.length + activity.length,
  });

  const dlg = $("cardDlg");
  if (!dlg.open) {
    dlg.showModal();
    // some browsers still focus the first control despite `autofocus` on the dialog
    if (document.activeElement && document.activeElement !== dlg) document.activeElement.blur();
    dlg.focus();
  }
}
$("dlgClose").onclick = () => $("cardDlg").close();
$("cardDlg").addEventListener("close", () => {
  openCardId = null;
  if (logTarget === $("dlgSessionLog")) { clearInterval(logTimer); logTimer = null; logCardId = null; logTarget = null; }
  clearTimeout(detailRefreshTimer);
  detailRefreshTimer = null;
});

/* --- dashboard: attention · activity · running session --------------------------------
   The board answers "what is the work?". The dashboard answers "is anything waiting on ME,
   what has the fleet just done, and what is running right now?" — three questions you could
   previously only answer by opening cards one at a time. It reads the board snapshot we
   already hold plus the change-feed; the only writes are reply (a comment, or an answer to a
   work-report question) and resolve (clear the attention flag). */
let dashCards = [];                              // cards from the latest snapshot, for the rail

//: hue per change-log op — the feed is scannable by colour before it is read
const OP_HUE = { moved: 220, created: 150, updated: 260, raised: 15, cleared: 150,
                 claimed: 200, released: 25, added: 175, archived: 25, deleted: 25 };

function attentionCards() {
  return dashCards
    .filter(c => (c.ext || {})["kanban_pro.attention"])
    .sort((a, b) => {                            // blocks first — they are the ones that HALT work
      const rank = c => ({ block: 0, warn: 1, info: 2 }[(c.ext["kanban_pro.attention"].severity) || "block"]);
      return rank(a) - rank(b) || String(b.updated_at ?? "").localeCompare(String(a.updated_at ?? ""));
    });
}

/* The count is the BLOCKING flags only. A warn/info badge that inflates the number teaches you
   to ignore the badge, which is exactly what the severity split exists to prevent. */
function refreshAttnBadge() {
  const blocking = attentionCards().filter(c =>
    ((c.ext["kanban_pro.attention"].severity) || "block") === "block").length;
  const badge = $("hdrAttn");
  badge.hidden = !blocking;
  badge.textContent = blocking;
  $("dashAttnCount").textContent = attentionCards().length;
}

const SEV_HUE = { block: 15, warn: 70, info: 250 };

function renderAttnRail() {
  const host = $("dashAttn");
  const items = attentionCards();
  $("dashAttnCount").textContent = items.length;
  if (!items.length) {
    host.innerHTML = `<div class="emptyPane"><div class="glyph" style="border-radius:50%;border-color:oklch(0.5 0.1 150);color:oklch(0.75 0.12 150)">✓</div>
      <div class="lead">Nothing needs you</div>
      <div class="sub">Every attention flag is cleared. The fleet is running unattended.</div></div>`;
    return;
  }
  host.innerHTML = "";
  for (const card of items) {
    const a = card.ext["kanban_pro.attention"];
    const sev = a.severity || "block";
    // an unanswered work-report question is the actual thing being asked — show it verbatim
    const q = ((card.ext.work_report || {}).questions || []).find(x => x && !x.answer);
    const el = document.createElement("div");
    el.className = "attnCard";
    el.style.setProperty("--sev-h", SEV_HUE[sev] ?? 70);
    el.innerHTML = `
      <div class="row">
        <span class="sevPill">${esc(sev.toUpperCase())}</span>
        ${(card.assignees || []).map(x => agentChip(x)).join("")}
        <span class="age">${age(card.updated_at || card.created_at)}</span>
      </div>
      <div class="key">${esc(card.id)}</div>
      <div class="ttl">${esc(card.title)}</div>
      <div class="why">${esc(a.reason || "")}</div>
      ${q ? `<div class="q">${esc(q.question || q.text || "")}</div>` : ""}
      <div class="reply">
        <textarea rows="1" placeholder="${q ? "Answer the agent…" : "Reply to the agent…"}"></textarea>
        <button type="button" class="flowBtn send" style="--lane-h:250"><span class="cdot"></span>${q ? "Answer" : "Send"}</button>
      </div>
      <div class="foot">
        <span>raised by</span>${agentChip(a.raised_by || "?")}
        ${a.for ? `<span>for</span>${agentChip(a.for)}` : ""}
        <button type="button" class="flowBtn resolve" style="--lane-h:150"><span class="cdot"></span>Resolve</button>
      </div>`;
    const open = () => { $("dashDlg").close(); openCard(card.id); };
    el.querySelector(".key").onclick = open;
    el.querySelector(".ttl").onclick = open;
    const ta = el.querySelector("textarea");
    const send = async () => {
      const text = ta.value.trim();
      if (!text) return;
      try {
        // a question gets ANSWERED (it lands in the report, where the agent reads it);
        // anything else is a comment. Replying into the void would be worse than useless.
        if (q) {
          await api(`/api/cards/${card.id}/work-report/questions/${encodeURIComponent(q.id)}/answer`,
            { method: "POST", headers: {"content-type": "application/json"},
              body: JSON.stringify({ answer: text }) });
        } else {
          await api(`/api/cards/${card.id}/comments`, { method: "POST",
            headers: {"content-type": "application/json"}, body: JSON.stringify({ body: text }) });
        }
        ta.value = "";
        toast(q ? "answer recorded on the work report" : "comment added");
      } catch (e) { toast(e.message); }
    };
    el.querySelector(".send").onclick = send;
    ta.addEventListener("keydown", ev => {           // ⌘/Ctrl+Enter sends; Enter alone is a newline
      if (ev.key === "Enter" && (ev.metaKey || ev.ctrlKey)) { ev.preventDefault(); send(); }
    });
    el.querySelector(".resolve").onclick = async () => {
      try {
        await api(`/api/cards/${card.id}/attention/clear`, { method: "POST",
          headers: {"content-type": "application/json"}, body: JSON.stringify({}) });
        toast("attention cleared");
      } catch (e) { toast(e.message); }
    };
    host.appendChild(el);
  }
}

/* Turn one change-log event into a sentence a human can skim.
   The raw event is (entity, op, slim payload) — rendering that literally gives you rows like
   "rebaser updated e8798148…f12d work_report", which is technically complete and tells you
   nothing. Every event type already carries the bit that MATTERS (the lane it moved to, the
   report section it filed, the severity and reason of an attention flag); this digs it out and
   says it, against the card's TITLE rather than its uuid. */
function digest(e) {
  const d = e.data || {};
  const cardId = d.card_id || e.entity_id;                 // comment events are keyed by comment id
  const card = dashCards.find(c => c.id === cardId);
  const lane = (lastBoard ? lastBoard.columns : []).find(c => c.id === d.column_id);
  const kind = `${e.entity}.${e.op}`;
  const short = s => { s = String(s || ""); return s.length > 90 ? s.slice(0, 88) + "…" : s; };
  switch (kind) {
    case "card.moved":
      return { label: d.forced ? "FORCED" : "moved", hue: d.forced ? 25 : 220, cardId,
               text: "→ " + laneLabel(d.column_id) };
    case "card.created":
      return { label: "created", hue: 150, cardId, text: short(d.title) };
    case "card.claimed":
      return { label: "claimed", hue: 200, cardId, text: "lease taken" };
    case "card.released":
      return { label: "released", hue: 25, cardId, text: "lease dropped" };
    case "card.updated": {
      const f = d.fields || [];
      // A patch whose ONLY field is `ext` is bookkeeping — a worker stamping its session pointer,
      // the dispatcher bumping an attempt counter. It is the single most common event on the
      // board and it says nothing a human wants to read, so the feed drops it. (The card's own
      // Discussion tab still shows every event; this is the digest, not the audit trail.)
      if (f.length === 1 && f[0] === "ext") return null;
      const what = f.includes("assignees") ? "reassigned"
                 : f.includes("priority") ? "re-prioritised"
                 : f.length ? `edited ${f.join(", ")}` : "edited";
      return { label: what, hue: 260, cardId, text: card ? (card.assignees || []).join(", ") : "" };
    }
    case "work_report.updated": {
      const verb = d.op === "remove" ? "removed" : "filed";
      return { label: "report", hue: 305, cardId,
               text: `${verb} ${d.section || ""}${d.item_id ? " · " + d.item_id : ""}` };
    }
    case "comment.added":
      // the event carries only {card_id, author} — never the body. "hermes-engineer commented
      // t_3302" is a fact with the content removed; the body is fetched and cached (see
      // commentCache) so the feed says WHAT was said.
      return { label: "commented", hue: 175, cardId,
               text: short(commentCache.get(e.entity_id) ?? "…") };
    case "attention.raised":
      return { label: (d.severity || "block").toUpperCase(), hue: d.severity === "warn" ? 70 : d.severity === "info" ? 250 : 15,
               cardId, text: short(d.reason) + (d.for_actor ? ` → ${String(d.for_actor).split(":").pop()}` : "") };
    case "attention.cleared":
      return { label: "resolved", hue: 150, cardId, text: short(d.resolution) };
    default:
      return { label: e.op, hue: OP_HUE[e.op] ?? 260, cardId, text: e.entity };
  }
}

async function renderFeed() {
  let events = [];
  // `since` is a CURSOR, not an offset: since=0 replays from the dawn of the board and the
  // "live" feed rendered the oldest 60 events ever recorded. Wind back from the current cursor.
  const FEED = 60;
  const since = Math.max(0, cursor - FEED);
  try { events = await api(`/api/changes?since=${since}&limit=${FEED}`); } catch { return; }
  $("dashActivity").innerHTML = [...events].reverse().map(e => {
    const g = digest(e);
    if (!g) return "";                       // suppressed as noise (see digest)
    const card = dashCards.find(c => c.id === g.cardId);
    const gone = titleCache.get(g.cardId) === null;      // fetched, and it isn't there
    const title = card ? card.title : (titleCache.get(g.cardId) || shortId(g.cardId));
    return `<div class="feedRow">
      <span class="t">${new Date(e.ts).toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"})}</span>
      <div class="bits">
        ${agentChip(e.actor)}
        <span class="opPill" style="--op-h:${g.hue}">${esc(g.label)}</span>
        ${title ? (gone
          ? `<span class="ref gone" title="not on this board — the change-log spans the whole profile">${esc(title)}</span>`
          : `<span class="ref" onclick="openCard('${esc(g.cardId)}')" title="${esc(g.cardId)}">${esc(title)}</span>`) : ""}
        ${gone && !g.text ? `<span class="txt dim">not on this board</span>`
                          : (g.text && g.text !== "…" ? `<span class="txt">${esc(g.text)}</span>` : "")}
      </div></div>`;
  }).join("") || `<div class="emptyPane"><div class="lead">No activity yet</div></div>`;

  // paint immediately with what we know, then fill in off-board titles and repaint once
  const unknown = events.map(e => (e.data || {}).card_id || e.entity_id)
                        .filter(id => id && !dashCards.some(c => c.id === id));
  const [gotTitles, gotBodies] = await Promise.all([enrichTitles(unknown), enrichComments(events)]);
  if ((gotTitles || gotBodies) && $("dashDlg").open) renderFeed();
}

async function renderRunningSession() {
  const running = dashCards.filter(c => (c.ext || {})._claim);
  const host = $("dashSession");
  $("dashSessAge").innerHTML = "";
  if (!running.length) {
    host.innerHTML = `<div class="emptyPane"><div class="glyph">⏸</div>
      <div class="lead">No active session</div>
      <div class="sub">No worker holds a lease right now. Claimed cards tail here live.</div></div>`;
    return;
  }
  host.innerHTML = running.map(c => {
    const claim = c.ext._claim;
    return `<div class="attnCard" style="--sev-h:150;cursor:pointer" onclick="$('dashDlg').close();openCard('${esc(c.id)}')">
      <div class="row">${agentChip(claim.owner)}<span class="age">lease until ${new Date(claim.expires_at).toLocaleTimeString()}</span></div>
      <div class="key">${esc(c.id)}</div>
      <div class="ttl">${esc(c.title)}</div>
      <div class="why">Open the card to tail its session log.</div>
    </div>`;
  }).join("");
  $("dashSessAge").innerHTML = `<span class="cdot pulse"></span>${running.length} running`;
}

function renderDash() { renderAttnRail(); renderFeed(); renderRunningSession(); }
$("dashBtn").onclick = () => { renderDash(); $("dashDlg").showModal(); };
$("dashClose").onclick = () => $("dashDlg").close();

/* --- the detail tabs -----------------------------------------------------------------
   Each tab keeps its own hue (report=blue, spec=violet, session=green, comments=teal,
   activity=amber) so the strip reads as a set of places, not five identical words. A tab
   with nothing in it is shown but dimmed — absence is information ("no work report yet"),
   whereas hiding the tab would just look like the feature doesn't exist. */
const TABS = [
  { id: "report",   pane: "paneReport",   label: "Work report", hue: 250 },
  { id: "spec",     pane: "paneSpec",     label: "Spec",        hue: 305 },
  { id: "session",  pane: "paneSession",  label: "Session log", hue: 150 },
  { id: "comments", pane: "paneComments", label: "Discussion",  hue: 175 },
];
/* Unseen activity: a tab you are NOT looking at should say when it gained something. The card
   re-renders on every change-feed event, so we remember the counts as of the last time each tab
   was actually LOOKED AT, and pulse the ones that have grown since. Watching the session log
   while a reviewer comments is exactly the case — the comment used to land silently. */
let seen = { cardId: null, counts: {} };
const unseen = new Set();

function trackUnseen(cardId, has) {
  const counts = { comments: has.comments || 0 };
  if (seen.cardId !== cardId) {          // different card: nothing is "unseen" yet
    seen = { cardId, counts };
    unseen.clear();
    return;
  }
  for (const [tab, n] of Object.entries(counts)) {
    if (tab === activeTab) { seen.counts[tab] = n; unseen.delete(tab); }   // you are looking at it
    else if (n > (seen.counts[tab] ?? n)) unseen.add(tab);
  }
}

function renderTabs(cardId, has) {
  trackUnseen(cardId, has);
  lastHas = has;
  const strip = $("dlgTabs");
  strip.innerHTML = "";
  // the default tab is the report — unless this card has none, in which case the spec is
  // what a reader actually wants first
  if (!has[activeTab] && !(activeTab === "report" && !has.report)) activeTab = "report";
  if (activeTab === "report" && !has.report && has.spec) activeTab = "spec";
  for (const t of TABS) {
    const count = t.id === "comments" ? has.comments : 0;
    const b = document.createElement("button");
    b.type = "button";
    b.dataset.tab = t.id;
    b.style.setProperty("--tab-h", t.hue);
    b.style.opacity = has[t.id] ? "" : ".55";
    if (t.id === "report" && has.flagged) b.classList.add("flagged");
    if (unseen.has(t.id)) b.classList.add("unseen");     // grew while you were on another tab
    const live = t.id === "session" && has.live;
    b.innerHTML = `<span class="cdot${live ? " pulse" : ""}"></span>${t.label}${count ? " · " + count : ""}`;
    b.onclick = () => {
      activeTab = t.id;
      if (lastHas && lastHas[t.id] != null) seen.counts[t.id] = lastHas[t.id];
      unseen.delete(t.id);
      showTab(cardId);
      b.classList.remove("unseen");
    };
    strip.appendChild(b);
  }
  showTab(cardId);
}
function showTab(cardId) {
  for (const t of TABS) $(t.pane).hidden = t.id !== activeTab;
  for (const b of $("dlgTabs").children) b.classList.toggle("on", b.dataset.tab === activeTab);
  if (activeTab === "session") tailSessionInto(cardId);   // only tail while the tab is open
}

/* --- session-log viewer: tail an agent's log; live-poll while its claim is held ---
   The same tail now feeds two surfaces: the Session tab inside the card dialog (the design's
   home for it) and the standalone pop-out. `logTarget` says which element is receiving it. */
let logCardId = null, logOffset = 0, logTimer = null, logTarget = null;
//: which of the card's sessions is being watched — 'worker', or a bound role ('engineer')
let sessionRole = null;

/* Render the session log INTO the card dialog's Session tab. */
async function tailSessionInto(cardId) {
  const view = $("dlgSessionLog"), meta = $("dlgSessionMeta");
  if (logCardId === cardId && logTarget === view) return;   // already tailing this one
  clearInterval(logTimer); logTimer = null;
  logCardId = cardId; logOffset = 0; logTarget = view;
  view.innerHTML = "";
  let d;
  try { d = await api(`/api/cards/${cardId}`); } catch { d = {}; }
  const ext = (d.card || {}).ext || {};
  const running = !!d.claim;
  const owner = running ? d.claim.owner : (ext.session || {}).actor;

  /* A card can have SEVERAL sessions at once: the worker that built it, and the ENGINEER that
     was called in when it blocked. They are different conversations about the same card, and the
     engineer's was invisible here — you could see that a flag was raised, but never watch the
     agent that was sent to deal with it. `ext["kanban_pro.sessions"]` binds one per role. */
  const bound = ext["kanban_pro.sessions"] || {};
  const roles = Object.keys(bound).filter(r => (bound[r] || {}).log);
  const hasWorker = !!((ext.session || {}).log || (ext.work || {}).log);
  if (!roles.length && !hasWorker) {
    meta.innerHTML = "";
    view.innerHTML = `<div class="emptyPane"><div class="glyph">⏸</div>
      <div class="lead">No session has run for this card yet</div>
      <div class="sub">When a worker claims it — or an engineer is called in on an attention
        flag — its transcript tails here live.</div></div>`;
    return;
  }
  if (!sessionRole || (sessionRole !== "worker" && !roles.includes(sessionRole)))
    sessionRole = hasWorker ? "worker" : roles[0];

  const pick = [
    ...(hasWorker ? [["worker", owner || "worker"]] : []),
    ...roles.map(r => [r, r]),
  ].map(([id, label]) => {
    const b = bound[id] || {};
    const on = sessionRole === id;
    return `<button type="button" class="flowBtn${on ? "" : " illegal"}"
              style="--lane-h:${agentHue(label)}" data-srole="${esc(id)}"
              title="${b.runtime ? esc(b.runtime) + " session " + esc(b.id || "") : "the worker's session"}">
              <span class="cdot"></span>${esc(label)}${b.runtime ? ` · ${esc(b.runtime)}` : ""}
            </button>`;
  }).join("");

  const live = sessionRole === "worker" ? running : false;
  meta.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      ${pick}
      <span style="margin-left:auto;font-size:11px;font-weight:600;color:${live ? "var(--ok)" : "var(--dim)"}">
        ${live ? "▶ streaming live" : "last session"}
      </span>
    </div>`;
  for (const b of meta.querySelectorAll("[data-srole]"))
    b.onclick = () => { sessionRole = b.dataset.srole; logCardId = null; tailSessionInto(cardId); };

  await pollLog(true);
  if (running) logTimer = setInterval(() => pollLog(false), 2000);
}

/* A raw agent log is prose, markdown and tool-call JSON in one stream, and printing it verbatim
   is what makes it unreadable: the `## Summary` and `**Applied fix-1.md**` an agent writes for a
   HUMAN render as literal hashes and asterisks, while a 40-line JSON tool payload nobody wants
   sits in the middle at full height. So: markdown is rendered, and a JSON blob is folded away
   behind a one-line summary you can click open. */
const JSON_LINE = /^\s*[[{]/;
function logEntryEl(e) {
  const div = document.createElement("div");
  div.className = "le " + (e.kind || "") + " " + (e.role || "");
  /* plain .log lines carry no useful role — label call/result, drop the rest;
     transcript entries keep role (+ kind suffix for tool/thinking). */
  let label;
  if (e.role === "log") label = { tool_use: "→ call", tool_result: "← result" }[e.kind] || "";
  else label = e.role + (e.kind && e.kind !== "text" && e.kind !== "line" ? "/" + e.kind : "");
  const text = e.text || "";
  const head = label ? `<span class="role">${esc(label)}</span>` : "";

  // a tool payload / JSON fragment: collapse it — it is machine chatter between the sentences
  if (JSON_LINE.test(text) || /^\s*"[\w_]+":/.test(text) || /^\s*[\]}],?\s*$/.test(text)) {
    div.classList.add("raw");
    div.innerHTML = head + `<code>${esc(text.length > 160 ? text.slice(0, 158) + "…" : text)}</code>`;
    return div;
  }
  div.innerHTML = head + `<div class="lemd">${md(text)}</div>`;
  return div;
}
function stopLogPolling() { clearInterval(logTimer); logTimer = null; }

async function pollLog(initial) {
  if (!logCardId) return;
  let data;
  try {
    const forRole = sessionRole && sessionRole !== "worker" ? `&role=${encodeURIComponent(sessionRole)}` : "";
    data = await api(`/api/cards/${logCardId}/session-log?after=${initial ? -1 : logOffset}${forRole}`);
  } catch (e) {
    stopLogPolling();
    const v = logTarget;
    if (initial && v) v.innerHTML = `<div class="le">could not load log — ${esc(e.message)}</div>`;
    return;
  }
  const view = logTarget;
  if (!view) return;
  const atBottom = view.scrollHeight - view.scrollTop - view.clientHeight < 40;
  for (const e of data.entries) view.appendChild(logEntryEl(e));
  logOffset = data.eof_offset;
  if (initial && !data.entries.length) view.innerHTML = `<div class="le">log is empty</div>`;
  if (atBottom || initial) view.scrollTop = view.scrollHeight;
}

$("commentForm").addEventListener("submit", async ev => {
  ev.preventDefault();
  const body = $("commentBody").value.trim();
  if (!body || !openCardId) return;
  try {
    await api(`/api/cards/${openCardId}/comments`, {
      method: "POST", headers: {"content-type": "application/json"},
      body: JSON.stringify({body}),
    });
    $("commentBody").value = "";
  } catch (e) { toast(e.message); }
});

/* Heal a stale board after the common freeze triggers — a backgrounded tab or a
   laptop that slept often kills the EventSource without a clean onerror. On regaining
   focus / connectivity, refresh() re-fetches the snapshot and (via connect()) revives
   a dead stream, so the board can't silently sit frozen on old lanes. */
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });
window.addEventListener("online", refresh);

(async () => {
  try { initFilters(); await loadMeta(); await loadBoards(); await refresh(); }
  catch (e) { toast(e.message); }
})();
</script>
