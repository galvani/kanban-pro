<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Orchestrator agent working">
<style>

  .line { fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .fill { fill: #000; }
  .paper { fill: #fff; stroke: #000; stroke-width: 2; stroke-linejoin: round; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  .node { transform-box: fill-box; transform-origin: center; animation: node 1.5s ease-in-out infinite; }
  #n2 { animation-delay:.25s; } #n3 { animation-delay:.5s; }
  #pulse { animation: pulse 1.5s ease-out infinite; transform-box: fill-box; transform-origin:center; }
  @keyframes node { 0%,100% { transform:scale(.85); } 50% { transform:scale(1.15); } }
  @keyframes pulse { 0% { transform:scale(.3); opacity:1; } 100% { transform:scale(1.5); opacity:0; } }
</style>
