<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Reviewer working">
<style>

  .line { fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .fill { fill: #000; }
  .paper { fill: #fff; stroke: #000; stroke-width: 2; stroke-linejoin: round; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  #lens { transform-box: fill-box; transform-origin: center; animation: inspect 1.8s ease-in-out infinite; }
  #mark { animation: blink 1.8s ease-in-out infinite; }
  @keyframes inspect {
    0%,100% { transform: translate(-3px, 1px) scale(.94); }
    50% { transform: translate(5px, -4px) scale(1.06); }
  }
  @keyframes blink { 0%,55% { opacity: 0; } 65%,100% { opacity: 1; } }
</style>
<circle class="line" cx="18" cy="14" r="6"/>
<path class="line" d="M8 35c1-9 5-14 10-14s9 5 10 14"/>
<rect class="paper" x="28" y="8" width="25" height="38" rx="2"/>
<path class="line" d="M34 16h13M34 22h11M34 28h8"/>
<g id="mark"><path class="line" d="m35 37 3 3 7-8"/></g>
<g id="lens">
  <circle class="paper" cx="43" cy="31" r="8"/>
  <path class="line" d="m49 37 8 8"/>
</g>
</svg>