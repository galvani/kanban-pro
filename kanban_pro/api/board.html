<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kanban-pro</title>
<!-- inline SVG favicon: three kanban lanes in the app palette (accent/ok/dim) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%231d2026'/%3E%3Crect%20x='5'%20y='7'%20width='6'%20height='18'%20rx='2'%20fill='%234f8cff'/%3E%3Crect%20x='13'%20y='7'%20width='6'%20height='11'%20rx='2'%20fill='%233fb96b'/%3E%3Crect%20x='21'%20y='7'%20width='6'%20height='15'%20rx='2'%20fill='%238a919e'/%3E%3C/svg%3E">

<style>
  /* Design tokens — "Redesign for readability" (claude.ai/design). The palette is oklch:
     one neutral ramp (hue 260) for chrome, and a HUE PER MEANING for everything semantic
     (lane, agent, severity). Colour is never decoration here — it encodes which agent and
     which lane, so a card can be read at a glance from across the board. */
  :root {
    --bg: oklch(0.17 0.012 260); --panel: oklch(0.205 0.012 260);
    --card: oklch(0.245 0.013 260); --card-hover: oklch(0.27 0.013 260);
    --text: oklch(0.96 0.005 260); --dim: oklch(0.62 0.01 260);
    --accent: oklch(0.72 0.14 250); --ok: oklch(0.75 0.14 150);
    --border: oklch(0.30 0.01 260); --border-hi: oklch(0.42 0.02 260);
    --danger: oklch(0.68 0.18 25); --warn: oklch(0.78 0.16 70);
    --sunken: oklch(0.155 0.012 260);
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  /* links were falling back to the browser's default blue (#0000ee) on a dark panel — legible
     only in the .desc/.comment scopes that happened to override it. One rule, everywhere. */
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: oklch(0.8 0.13 250); text-decoration: underline; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.45 system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px; padding: 9px 16px;
           background: var(--panel); border-bottom: 1px solid oklch(0.28 0.01 260); flex: none; }
  header h1 { font-size: 16px; margin: 0; font-weight: 800; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }
  select { background: oklch(0.24 0.012 260); color: var(--text);
           border: 1px solid oklch(0.32 0.01 260); border-radius: 8px; padding: 5px 9px;
           font-weight: 600; font-size: 12.5px; }
  /* the filter row: a segmented control, not three loose checkboxes with a lone dropdown */
  .filters { display: flex; align-items: center; gap: 4px; padding: 3px; border-radius: 9px;
             border: 1px solid oklch(0.30 0.01 260); background: oklch(0.235 0.012 260); }
  .filters label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
                   user-select: none; padding: 4px 10px; border-radius: 7px; font-size: 12px;
                   font-weight: 600; color: oklch(0.66 0.01 260); }
  .filters label:hover { background: oklch(0.28 0.012 260); }
  .filters label:has(input:checked) { background: oklch(0.32 0.05 250 / 0.45);
                                      color: oklch(0.88 0.1 250); }
  .filters select { border: 0; background: transparent; padding: 3px 4px; }
  .filters { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--dim); }
  .filters label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  .filters input[type=checkbox] { accent-color: var(--accent); cursor: pointer; margin: 0; }
  .filters select { padding: 2px 6px; font-size: 12px; }
  .meta { margin-left: auto; display: flex; gap: 12px; align-items: center;
          color: var(--dim); font-size: 12px; }
  .hdrDiv { width: 1px; height: 20px; background: oklch(0.32 0.01 260); flex: none; }
  /* profile/actor read as one identity pill, not two stray strings pushed to the far right */
  .pill { display: inline-flex; align-items: center; gap: 7px; padding: 4px 11px;
          border: 1px solid oklch(0.32 0.01 260); border-radius: 8px;
          background: oklch(0.24 0.012 260); font-size: 12.5px; font-weight: 600; }
  .pillKey { color: oklch(0.58 0.01 260); font-size: 11px; text-transform: uppercase;
             letter-spacing: .05em; font-weight: 700; }
  /* stale cards (no activity in >7d): dimmed but still there; hover restores. */
  .card.stale { opacity: .42; }
  .card.stale:hover { opacity: 1; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .dot.live { background: var(--ok); }
  #board { flex: 1; display: flex; gap: 12px; padding: 14px; overflow-x: auto; overflow-y: hidden;
           align-items: flex-start; height: 100%; }
  /* --lane-h: the column's hue, set per-column in JS from its category (see LANE_HUE) */
  .col { background: var(--panel); border: 1px solid oklch(0.29 0.01 260); border-radius: 11px;
         flex: none; width: 266px; max-height: 100%; display: flex; flex-direction: column;
         overflow: hidden; transition: width .2s; }
  .col h2 { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em;
            margin: 0; padding: 10px 13px; display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; flex: none;
            font-weight: 800; color: oklch(0.9 0.02 var(--lane-h, 260)); }
  .col h2 .laneDot { width: 8px; height: 8px; border-radius: 50%; flex: none;
                     background: oklch(0.74 0.13 var(--lane-h, 260)); }
  .col h2 .laneCount { margin-left: auto; min-width: 20px; text-align: center; padding: 1px 6px;
                       border-radius: 20px; font-size: 11.5px; font-weight: 800;
                       background: oklch(0.32 0.05 var(--lane-h, 260) / 0.5);
                       color: oklch(0.85 0.10 var(--lane-h, 260)); }
  .col.empty h2 { color: oklch(0.62 0.03 var(--lane-h, 260)); }
  /* collapsed lane: a 44px vertical rail — the name stays readable, the cards fold away */
  .col.collapsed { width: 44px; }
  /* A folded lane stacks its name DOWNWARD with the letters still UPRIGHT (text-orientation:
     upright) — a 90°-rotated word makes you tilt your head, and the count especially: it is the
     one thing you fold the lane in order to keep seeing. Nothing here is rotated. */
  .col.collapsed h2 { flex-direction: column; justify-content: flex-start; height: 100%;
                      padding: 11px 0; border-bottom: 0; gap: 6px; }
  .col.collapsed h2 .laneName { writing-mode: vertical-rl; text-orientation: upright;
                                letter-spacing: .04em; line-height: 1.05; }
  .col.collapsed h2 .laneCount { margin-left: 0; }
  .col.collapsed .cards { display: none; }
  .col.dragover { outline: 2px dashed var(--accent); outline-offset: -4px; }
  .cards { padding: 8px 9px 40px; overflow-y: auto; overflow-x: hidden;
           display: flex; flex-direction: column; gap: 8px; flex: 1; }
  /* --acc-h: the card's accent hue = its primary agent's hue (attention → amber) */
  .card { background: var(--card); border: 1px solid oklch(0.32 0.01 260);
          border-left: 3px solid oklch(0.70 0.13 var(--acc-h, 260)); border-radius: 8px;
          padding: 9px 11px; cursor: grab; transition: opacity .15s, border-color .12s; }
  .card:hover { border-color: var(--border-hi); opacity: 1 !important; }
  .card .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
  .card .badges:empty { display: none; }
  .card .t { font-size: 13px; font-weight: 600; line-height: 1.38; color: oklch(0.95 0.005 260);
             word-break: break-word; text-wrap: pretty; }
  /* the preview is two lines, clamped — a wall of text on the card face is what made the
     old board unreadable; the detail panel is where the full text belongs */
  .card .preview { margin-top: 7px; font-size: 11.5px; line-height: 1.42; color: oklch(0.66 0.01 260);
                   display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
                   overflow: hidden; }
  .card .sub { display: flex; align-items: center; gap: 7px; margin-top: 9px; font-size: 11px; }
  .card .sub .hash { font-family: var(--mono); font-size: 11px; color: oklch(0.58 0.01 260); }
  .card .sub .when { margin-left: auto; font-weight: 600; color: oklch(0.64 0.01 260); }
  /* copy-id: revealed on hover only — present when wanted, silent when not */
  .card .copy { padding: 1px 7px; border-radius: 5px; font-size: 10px; line-height: 16px;
                font-weight: 700; border: 1px solid oklch(0.36 0.01 260);
                background: oklch(0.28 0.012 260); color: oklch(0.72 0.01 260);
                opacity: 0; pointer-events: none; transition: opacity .12s; cursor: pointer; }
  .card:hover .copy { opacity: 1; pointer-events: auto; }
  .card .copy.copied { border-color: oklch(0.6 0.1 150 / 0.5); background: oklch(0.4 0.08 150 / 0.35);
                       color: oklch(0.82 0.11 150); }
  /* --chip-h: the agent's hue (AGENT_HUE) — same agent, same colour, everywhere */
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 5px;
          font-size: 10px; font-weight: 700; letter-spacing: .03em; white-space: nowrap;
          background: oklch(0.33 0.06 var(--chip-h, 260) / 0.55);
          color: oklch(0.85 0.12 var(--chip-h, 260));
          border: 1px solid oklch(0.55 0.09 var(--chip-h, 260) / 0.45); }
  .chip .cdot { width: 5px; height: 5px; border-radius: 50%; flex: none;
                background: oklch(0.8 0.14 var(--chip-h, 260)); }
  .chip.attn { background: var(--warn); color: oklch(0.24 0.06 70); border: 0; text-transform: uppercase;
               font-weight: 800; letter-spacing: .04em; }
  .chip.attn .cdot { background: oklch(0.24 0.06 70); border-radius: 1px; transform: rotate(45deg); }
  .chip svg { margin-right: 2px; }
  /* per-agent colours are no longer hand-listed: the hue comes from AGENT_HUE in JS, so a new
     agent gets a stable colour with no CSS edit. `unknown` still shouts — an assignee the
     dispatcher doesn't route to is a mistake, not a colour. */
  .chip.unknown { background: oklch(0.32 0.09 25 / 0.5); border-color: var(--danger);
                  color: oklch(0.82 0.14 25); }
  .chip.unknown::before { content: "⚠️"; margin-right: 2px; }
  .chip.live { background: oklch(0.32 0.05 150 / 0.5); color: oklch(0.85 0.12 150);
               border-color: oklch(0.55 0.09 150 / 0.45); }
  /* the lane pill in the card dialog — same hue as the lane it names */
  .lanePill { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 20px;
              font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
              background: oklch(0.32 0.06 var(--lane-h, 260) / 0.45);
              color: oklch(0.82 0.12 var(--lane-h, 260));
              border: 1px solid oklch(0.55 0.09 var(--lane-h, 260) / 0.4); }
  /* --- dashboard ------------------------------------------------------------------- */
  .dashBtn { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px;
             border-radius: 8px; font-size: 12.5px; font-weight: 700; cursor: pointer;
             border: 1px solid oklch(0.32 0.01 260); background: oklch(0.24 0.012 260);
             color: var(--text); }
  .dashBtn:hover { border-color: var(--accent); }
  .dashBtn .cdot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .attnCount { min-width: 20px; text-align: center; padding: 1px 7px; border-radius: 20px;
               font-size: 11px; font-weight: 800; background: oklch(0.68 0.16 15 / 0.22);
               color: oklch(0.82 0.14 15); border: 1px solid oklch(0.6 0.14 15 / 0.4); }
  #dashDlg { width: min(1680px, 97vw); height: 92vh; padding: 0;
             flex-direction: column; overflow: hidden; }   /* display: only when [open] — see #cardDlg */
  #dashDlg[open] { display: flex; }
  .dashHead { display: flex; align-items: center; gap: 14px; padding: 15px 22px; flex: none;
              border-bottom: 1px solid oklch(0.28 0.01 260); }
  .dashTitle { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
  .dashSub { font-size: 12px; color: var(--dim); margin-top: 2px; }
  .xbtn { margin-left: auto; width: 30px; height: 30px; border-radius: 8px; flex: none;
          border: 1px solid oklch(0.32 0.01 260); background: oklch(0.24 0.012 260);
          color: oklch(0.8 0.01 260); font-size: 14px; cursor: pointer; padding: 0; }
  .dashBody { display: flex; flex: 1; min-height: 0; }
  .dashCol { display: flex; flex-direction: column; min-width: 0;
             border-right: 1px solid oklch(0.28 0.01 260); }
  /* attention is the column you ACT in — it carries a reply box, two actor chips and a button,
     so it gets the room. Activity is SCANNED, not worked, and takes what is left. */
  #dashAttnCol { width: 500px; flex: none; }
  .dashMain { flex: 1; min-width: 300px; }
  .dashSess { width: 440px; flex: none; border-right: 0; }
  /* a card title can be long; keep one event on one line so the feed stays scannable */
  .feedRow .ref { max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dashColHead { display: flex; align-items: center; gap: 9px; padding: 12px 18px; flex: none;
                 border-bottom: 1px solid oklch(0.26 0.01 260); }
  .dashColTitle { font-size: 11.5px; font-weight: 800; letter-spacing: .07em;
                  color: oklch(0.72 0.01 260); }
  .dashColNote { font-size: 11.5px; color: oklch(0.55 0.01 260); }
  .liveTag { margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
             font-size: 11px; font-weight: 600; color: var(--ok); }
  .liveTag .cdot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
  .dashScroll { flex: 1; overflow-y: auto; padding: 14px 16px 34px; }
  .attnCard { border: 1px solid oklch(0.5 0.1 var(--sev-h, 70) / 0.45);
              border-left: 3px solid oklch(0.75 0.15 var(--sev-h, 70));
              border-radius: 10px; background: oklch(0.24 0.02 var(--sev-h, 70) / 0.35);
              padding: 12px 14px; margin-bottom: 10px; }
  .attnCard .row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .attnCard .age { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--dim); }
  .attnCard .key { font-family: var(--mono); font-size: 11.5px; font-weight: 700;
                   color: oklch(0.78 0.08 250); cursor: pointer; }
  .attnCard .ttl { font-size: 13px; font-weight: 600; line-height: 1.35; margin-top: 3px;
                   cursor: pointer; text-wrap: pretty; }
  .attnCard .why { font-size: 12px; line-height: 1.45; margin-top: 6px; color: oklch(0.72 0.01 260); }
  .attnCard .q { margin-top: 9px; padding: 9px 11px; border-radius: 7px; font-size: 12px;
                 line-height: 1.42; background: oklch(0.27 0.014 260);
                 border: 1px solid oklch(0.33 0.02 250); color: oklch(0.87 0.03 250); }
  .attnCard .reply { display: flex; gap: 7px; margin-top: 10px; }
  .attnCard textarea { flex: 1; min-width: 0; resize: none; padding: 7px 10px; border-radius: 7px;
                       border: 1px solid oklch(0.34 0.01 260); background: oklch(0.2 0.01 260);
                       color: var(--text); font: inherit; font-size: 12px; }
  /* wraps: "raised by <chip> for <chip>" plus a button does not fit the 380px rail on one line,
     and the Resolve button was being pushed off the edge */
  .attnCard .foot { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap;
                    font-size: 11px; color: var(--dim); }
  /* the rail's Resolve is the same .flowBtn as everywhere else — it only needs its position */
  .attnCard .resolve { margin-left: auto; }
  .sevPill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px;
             font-size: 10px; font-weight: 800; letter-spacing: .04em;
             background: oklch(0.72 0.16 var(--sev-h, 70)); color: oklch(0.22 0.05 var(--sev-h, 70)); }
  .feedRow { display: flex; gap: 10px; padding: 7px 2px; line-height: 1.35;
             border-bottom: 1px solid oklch(0.225 0.008 260); }
  .feedRow .t { flex: none; width: 54px; text-align: right; font-family: var(--mono);
                font-size: 10.5px; color: oklch(0.52 0.01 260); padding-top: 2px; }
  .feedRow .bits { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 5px 6px; }
  .opPill { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 5px;
            font-size: 10px; font-weight: 800; letter-spacing: .03em;
            background: oklch(0.32 0.05 var(--op-h, 260) / 0.55);
            color: oklch(0.85 0.11 var(--op-h, 260)); }
  .feedRow .ref { font-family: var(--mono); font-size: 11px; color: oklch(0.78 0.1 250);
                  cursor: pointer; border-bottom: 1px dotted oklch(0.6 0.08 250 / 0.6); }
  .feedRow .ref:hover { color: oklch(0.88 0.12 250); border-bottom-style: solid; }
  .feedRow .txt { font-size: 12px; color: oklch(0.8 0.008 260); }
  .feedRow .txt.dim { color: oklch(0.5 0.01 260); font-style: italic; }
  .feedRow .ref.gone { color: oklch(0.55 0.01 260); border-bottom: 0; cursor: default; }
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 12px; width: min(1400px, 96vw); max-height: 90vh; overflow-y: auto; }
  /* The card dialog is a FIXED frame: same size on every card and on every tab. It used to be
     sized by its content, so switching tabs (or a card with a short report) made the panel jump
     and resize under the cursor — the buttons you were aiming at moved. The frame stays put and
     the CONTENT scrolls inside it. */
  /* NB: `display` goes ONLY in the [open] rule. A bare `display:flex` here overrides the UA's
     `dialog { display: none }` for the CLOSED state, so the dialog stays in the layer, invisible
     but swallowing every click on the board behind it. */
  #cardDlg { width: min(1840px, 98vw); height: 94vh; flex-direction: column; padding: 0; }
  #cardDlg[open] { display: flex; }
  #cardDlg .body { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden;
                   padding: 0; }
  #cardDlg .tabPane { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 20px 24px; }
  /* The Session pane had TWO scrollers: the pane itself, and the .logView's own max-height. You
     ended up scrolling the section, not the log — and the log could never sit at the bottom.
     The pane doesn't scroll; the log box fills it and is the only thing that does. */
  #cardDlg #paneSession { display: flex; flex-direction: column; overflow: hidden; padding-bottom: 18px; }
  #cardDlg #paneSession[hidden] { display: none; }
  #dlgSessionLog { flex: 1; min-height: 0; max-height: none; margin-top: 0; }
  /* the head is FIXED: identity, attention, meta and the move row never scroll away. On a long
     work report you could previously lose the card's own title and its Move-to buttons. */
  .dlgHead { flex: none; padding: 12px 20px 0; border-bottom: 1px solid var(--border);
             background: var(--panel); }
  .dlgIdRow { display: flex; align-items: center; gap: 10px; }
  .dlgKey { font-family: var(--mono); font-size: 13px; font-weight: 700;
            color: oklch(0.8 0.08 250); }
  #cardDlg h3 { font-size: 17px; font-weight: 800; line-height: 1.25; margin: 6px 0 0;
                color: oklch(0.97 0.005 260); text-wrap: pretty; }
  .dlgSub { font-family: var(--mono); font-size: 11px; color: oklch(0.54 0.01 260);
            margin-top: 3px; }
  .dlgIdRow .xbtn { margin-left: auto; }
  /* meta reads as labelled columns (LABEL above value), not a run of "key: value" pairs */
  #dlgGrid { display: flex; flex-wrap: wrap; gap: 8px 24px; padding: 10px 0 8px; align-items: center; }
  #dlgGrid .mi { flex-direction: row; align-items: center; gap: 8px; }
  #dlgGrid .mi { display: flex; flex-direction: column; gap: 6px; min-width: 0; flex: none; }
  #dlgGrid .mk { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
                 color: oklch(0.54 0.01 260); }
  #dlgGrid .mv { font-size: 13px; color: oklch(0.86 0.006 260); max-width: 420px;
                 overflow: hidden; text-overflow: ellipsis; }
  .asgBox { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .asgChip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 4px 3px 8px;
             border-radius: 6px; font-size: 11.5px; font-weight: 700; white-space: nowrap;
             background: oklch(0.33 0.06 var(--chip-h, 260) / 0.55);
             color: oklch(0.85 0.12 var(--chip-h, 260));
             border: 1px solid oklch(0.55 0.09 var(--chip-h, 260) / 0.45); }
  .asgChip .cdot { width: 5px; height: 5px; border-radius: 50%;
                   background: oklch(0.8 0.14 var(--chip-h, 260)); }
  .asgChip .asgX { background: none; border: 0; color: inherit; opacity: .6; cursor: pointer;
                   font-size: 10px; padding: 0 3px; border-radius: 4px; }
  .asgChip .asgX:hover { opacity: 1; background: oklch(0.5 0.12 25 / 0.5); }
  .asgNone { font-size: 12.5px; color: var(--dim); font-style: italic; }
  #dlgAssignAdd { font-size: 11.5px; padding: 3px 6px; }
  .moveRow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
             padding: 9px 0; border-top: 1px solid var(--border); }
  .mvLabel { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
             color: oklch(0.54 0.01 260); flex: none; }
  /* showModal() focuses the first focusable child — which was the assignee <select>, so the
     dialog opened with a control highlighted and one stray keystroke away from a reassign.
     `autofocus` on the dialog itself keeps focus on the dialog (and off any control). */
  dialog:focus, dialog:focus-visible { outline: none; }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  dialog .body { padding: 18px 20px; }
  dialog h3 { margin: 0 0 4px; }
  dialog .desc { color: var(--text); margin: 10px 0;
                 border-left: 3px solid var(--border); padding-left: 10px; }
  dialog h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
              color: var(--dim); margin: 16px 0 6px; }
  .comment { border-top: 1px solid var(--border); padding: 8px 0; }
  .comment .who { font-size: 11px; color: var(--dim); }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
           border-radius: 4px; margin-right: 4px; text-transform: uppercase; }
  .badge-summary    { background: #2d3d1f; color: #b0e090; }
  .badge-escalate   { background: #3d1f1f; color: #f09090; }
  .badge-coder-findings { background: #1f2d3d; color: #90c0f0; }
  .gateLabel { display: inline-block; font-size: 11px; font-weight: 600; color: var(--dim);
               min-width: 120px; }
  .gateVal { color: var(--text); }
  /* the one-sentence status: hue says the mood (red blocked / amber unverified / green done) */
  .statusLine { display: flex; align-items: center; gap: 9px; margin-top: 8px; padding: 7px 11px;
                border-radius: 8px; font-size: 13px; line-height: 1.45;
                border: 1px solid oklch(0.5 0.09 var(--s-h, 260) / 0.4);
                background: oklch(0.3 0.05 var(--s-h, 260) / 0.16);
                color: oklch(0.92 0.03 var(--s-h, 260)); }
  .statusLine .sdot { width: 8px; height: 8px; border-radius: 50%; flex: none;
                      background: oklch(0.75 0.14 var(--s-h, 260)); }
  .statusLine .stext { flex: 1; min-width: 0; }
  /* what the card itself says should happen next — the move, not the state */
  .nextLine { display: flex; align-items: baseline; gap: 8px; margin-top: 6px; padding: 7px 11px;
              border-radius: 8px; background: oklch(0.22 0.012 260);
              border: 1px solid var(--border); font-size: 12.5px; line-height: 1.45; }
  .nlabel { flex: none; font-size: 10px; font-weight: 700; letter-spacing: .07em;
            text-transform: uppercase; color: oklch(0.54 0.01 260); }
  .ntext { color: oklch(0.88 0.006 260); min-width: 0; }
  .ntext p { margin: 0; }
  .statusLine .sact { flex: none; font-size: 10px; font-weight: 800; letter-spacing: .05em;
                      text-transform: uppercase; padding: 2px 8px; border-radius: 5px;
                      background: var(--warn); color: oklch(0.24 0.06 70); }
  /* checklist rows: the box IS the state (✓ pass, ✗ fail, ⚠ not run, ☐ to do) */
  /* main column + a narrow rail for the short sections */
  .rpGrid { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 16px; align-items: start; }
  .rpGrid.noSide { grid-template-columns: minmax(0, 1fr); }
  .rpGrid.noSide .rpSide { display: none; }
  @media (max-width: 1200px) { .rpGrid { grid-template-columns: minmax(0, 1fr); } }
  .rpTally { font-size: 11.5px; font-weight: 700; color: var(--dim); margin-bottom: 8px; }
  .rpBox { flex: none; width: 18px; text-align: center; font-size: 13px; font-weight: 800; }
  .rpCheck.ok .rpBox { color: oklch(0.78 0.13 150); }
  .rpCheck.bad .rpBox { color: oklch(0.72 0.16 15); }
  .rpCheck.unrun .rpBox, .rpCheck.blocked .rpBox { color: var(--warn); }
  .rpCheck.doing .rpBox { color: oklch(0.78 0.12 200); }
  .rpCheck.todo .rpBox { color: oklch(0.55 0.01 260); }
  /* an un-run check is a HOLE in the verification, not a neutral note — tint the whole row */
  .rpCheck.unrun { background: oklch(0.3 0.05 70 / 0.12); }
  .rpCheck.bad { background: oklch(0.3 0.06 15 / 0.12); }
  .rpCheckName.struck { text-decoration: line-through; color: var(--dim); }
  .rpState { flex: none; font-size: 10.5px; font-weight: 700; color: var(--dim); }
  .rpState.doing { color: oklch(0.8 0.11 200); }
  .rpState.bad { color: oklch(0.8 0.13 15); }
  .attention { border: 1px solid oklch(0.5 0.1 var(--sev-h, 70) / 0.5);
               border-left: 3px solid oklch(0.78 0.16 var(--sev-h, 70));
               background: oklch(0.32 0.06 var(--sev-h, 70) / 0.18);
               border-radius: 9px; padding: 9px 12px; margin: 8px 0 0; font-size: 12.5px; }
  /* a long dispatcher reason was pushing the whole report below the fold */
  .attnWhy { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
             overflow: hidden; cursor: pointer; }
  .attnWhy.open { display: block; }
  .attnTop { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .attnWho { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
             color: oklch(0.9 0.04 70); }
  .attnBy { display: inline-flex; align-items: center; gap: 6px; margin-left: auto;
            font-size: 11.5px; color: var(--dim); }
  .attnWhy { font-size: 12.5px; line-height: 1.45; margin-top: 6px; color: oklch(0.9 0.03 70); }
  .attnQ { margin-top: 9px; padding: 9px 11px; border-radius: 7px; font-size: 12.5px; line-height: 1.45;
           background: oklch(0.27 0.014 260); border: 1px solid oklch(0.33 0.02 250);
           color: oklch(0.88 0.03 250); }
  .attnActs { display: flex; gap: 7px; margin-top: 10px; align-items: center; }
  .attnActs input { flex: 1; min-width: 0; background: oklch(0.2 0.01 260);
                    border: 1px solid oklch(0.34 0.01 260); color: var(--text);
                    border-radius: 7px; padding: 6px 10px; font-size: 12.5px; }
  /* the tab that HOLDS the thing being asked of you — an unanswered question is inside the work
     report, and a banner that says "answer me" while the answer lives two clicks away is a
     dead end. The tab wears the same amber as the flag. */
  /* unseen: this tab gained something while you were looking at another one */
  .tabs button.unseen { color: oklch(0.92 0.02 260); opacity: 1 !important; }
  .tabs button.unseen .cdot { opacity: 1; animation: kpPulse 1.4s ease-in-out infinite;
                              box-shadow: 0 0 0 3px oklch(0.74 0.13 var(--tab-h, 260) / 0.22); }
  .tabs button.flagged { color: oklch(0.9 0.08 70); }
  .tabs button.flagged .cdot { background: var(--warn); opacity: 1;
                               box-shadow: 0 0 0 3px oklch(0.78 0.16 70 / 0.2); }
  .metaGrid { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 12px;
               align-items: center; }
  .metaGrid .mi { display: inline-flex; align-items: center; gap: 5px;
                  min-width: calc(50% - 8px); flex: 1 0 calc(50% - 8px); }
  .metaGrid .mi:only-child { min-width: auto; flex: none; }
  .metaGrid .mk { color: var(--dim); white-space: nowrap; flex: none; }
  .metaGrid .mv { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  /* Move-to: a legal target is lit in its lane's hue; an ILLEGAL one is still shown, dashed and
     dimmed, because hiding it hides the flow. ⌘/Ctrl-click forces it (audited, never silent). */
  .moveBtns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  /* one button shape for every hue-carrying action (the flow lanes, and the attention actions):
     a pill tinted by --lane-h with a dot in the same hue. Defined once, used by both. */
  .moveBtns button, .flowBtn {
                     display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px;
                     border-radius: 8px; font-size: 12px; font-weight: 600; white-space: nowrap;
                     cursor: pointer;
                     border: 1px solid oklch(0.52 0.08 var(--lane-h, 260) / 0.45);
                     background: oklch(0.30 0.055 var(--lane-h, 260) / 0.4);
                     color: oklch(0.87 0.10 var(--lane-h, 260)); }
  .moveBtns button:hover, .flowBtn:hover { background: oklch(0.36 0.07 var(--lane-h, 260) / 0.5); }
  .moveBtns button .cdot, .flowBtn .cdot { width: 6px; height: 6px; border-radius: 50%; flex: none;
                           background: oklch(0.76 0.13 var(--lane-h, 260)); }
  .moveBtns button.illegal { border: 1px dashed oklch(0.3 0.008 260); background: transparent;
                             color: oklch(0.44 0.01 260); opacity: .55; }
  .moveBtns button.illegal .cdot { background: oklch(0.4 0.01 260); }
  .moveBtns button.illegal:hover { opacity: .9; }
  /* tabbed detail: the old dialog stacked report+comments+activity+log in one scroll, which is
     exactly what buried the work report. One tab at a time; the report is the default. */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin: 14px 0 0; }
  .tabs button { display: inline-flex; align-items: center; gap: 7px; padding: 9px 15px;
                 border: 0; background: none; cursor: pointer; font-size: 13px; font-weight: 600;
                 color: oklch(0.6 0.01 260); border-bottom: 2px solid transparent;
                 border-radius: 0; margin-bottom: -1px; }
  .tabs button .cdot { width: 7px; height: 7px; border-radius: 50%; flex: none; opacity: .55;
                       background: oklch(0.74 0.13 var(--tab-h, 260)); }
  .tabs button.on { font-weight: 700; color: oklch(0.95 0.005 260); border-bottom-color: var(--accent); }
  .tabs button.on .cdot { opacity: 1; }
  .tabs button .cdot.pulse { animation: kpPulse 1.4s ease-in-out infinite; }
  @keyframes kpPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .tabPane { padding-top: 16px; }
  .tabPane[hidden] { display: none; }
  .emptyPane { display: flex; flex-direction: column; align-items: center; justify-content: center;
               gap: 9px; padding: 64px 24px; text-align: center; color: oklch(0.55 0.01 260); }
  .emptyPane .glyph { width: 38px; height: 38px; border-radius: 9px; display: flex;
                      align-items: center; justify-content: center; font-size: 17px;
                      border: 1.5px solid oklch(0.36 0.01 260); color: oklch(0.5 0.01 260); }
  .emptyPane .lead { font-size: 14px; font-weight: 600; color: oklch(0.72 0.01 260); }
  .emptyPane .sub { font-size: 12.5px; line-height: 1.45; max-width: 340px; }
  .relRow { font-size: 13px; padding: 3px 0; }
  .relRow a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .reportSec { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
               margin: 0 0 10px; background: oklch(0.205 0.012 260); break-inside: avoid; }
  .reportSec h4 { margin: -8px -10px 8px; padding: 6px 10px; border-radius: 8px 8px 0 0;
                 font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
                 cursor: pointer; user-select: none; }
  /* collapsed: the header alone remains, so the section is still there to click back open */
  .reportSec.collapsed { padding-bottom: 0; }
  .reportSec.collapsed h4 { margin-bottom: -8px; border-radius: 8px; }
  .reportSec.collapsed .secBody { display: none; }
  .secCaret { display: inline-block; width: 12px; margin-right: 4px; transition: transform .12s; }
  .reportSec.collapsed .secCaret { transform: rotate(-90deg); }
  .hdr-findings    { background: #3d1f2a; color: #f0a0b0; }
  .hdr-checks      { background: #1f2d3d; color: #90c0f0; }
  .hdr-verdict     { background: #2d3d1f; color: #b0e090; }
  .hdr-handoff     { background: #3d2d1f; color: #f0c090; }
  .hdr-about       { background: #2a1f3d; color: #c0a0f0; }
  .hdr-plan        { background: #1f3d3d; color: #90e0e0; }
  .hdr-analysis_log,
  .hdr-analysis    { background: #3d1f2a; color: #f0a0b0; }
  .hdr-needs       { background: #3d2d2d; color: #f0b0b0; }
  .hdr-questions   { background: #2d2d3d; color: #c0c0f0; }
  .hdr-unknown     { background: #2d323e; color: #d4d7de; }
  /* --- typed work-report shapes (see renderVerdict/renderFindings/renderChecks) --- */
  .rpPill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px;
            font-size: 10px; font-weight: 800; letter-spacing: .04em; white-space: nowrap;
            background: oklch(0.72 0.16 var(--p-h, 260)); color: oklch(0.22 0.05 var(--p-h, 260)); }
  .rpPill.flat { background: oklch(0.32 0.05 var(--p-h, 260) / 0.5);
                 color: oklch(0.82 0.08 var(--p-h, 260));
                 border: 1px solid oklch(0.5 0.06 var(--p-h, 260) / 0.4); }
  .rpVerdict { display: flex; align-items: center; gap: 9px; }
  .rpStatus { font-family: var(--mono); font-size: 12.5px; color: oklch(0.86 0.006 260); }
  .rpBody { font-size: 13px; line-height: 1.55; margin-top: 8px; color: oklch(0.85 0.006 260); }
  .rpBody.dim { color: oklch(0.68 0.01 260); font-size: 12.5px; }
  /* a finding is a CARD, not a table row: severity leads, the fix is the thing you act on */
  .rpFinding { border: 1px solid oklch(0.5 0.08 var(--f-h, 260) / 0.35);
               border-left: 3px solid oklch(0.66 0.15 var(--f-h, 260));
               border-radius: 9px; background: oklch(0.225 0.012 260);
               padding: 9px 11px; margin-top: 8px; }
  .rpFinding:first-child { margin-top: 0; }
  .rpFindHead { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .rpTag { font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
           padding: 2px 8px; border-radius: 5px; background: oklch(0.3 0.008 260);
           color: oklch(0.72 0.01 260); }
  .rpId { font-family: var(--mono); font-size: 10.5px; color: oklch(0.55 0.01 260); }
  .rpLoc { margin-left: auto; font-family: var(--mono); font-size: 11px;
           color: oklch(0.68 0.05 250); word-break: break-all; }
  .rpFindTitle { font-size: 13.5px; font-weight: 600; line-height: 1.4; margin-top: 8px;
                 color: oklch(0.93 0.005 260); text-wrap: pretty; }
  /* closed, not hidden: the record stays, but it stops competing with the open work */
  .rpFinding.fixed { opacity: .62; }
  .rpFinding.fixed:hover { opacity: 1; }
  .rpFinding.fixed .rpFindTitle { text-decoration: line-through; color: oklch(0.72 0.01 260); }
  .rpFix { margin-top: 7px; padding: 7px 10px; border-radius: 7px; background: oklch(0.25 0.012 260);
           font-size: 12.5px; line-height: 1.45; color: oklch(0.83 0.006 260); }
  .rpFix b { color: oklch(0.72 0.12 150); }
  /* a plan carried as steps[] on one item — numbered, readable, not a wall */
  .rpSteps { margin: 4px 0 0; padding-left: 20px; color: var(--fg); }
  .rpSteps li { margin: 3px 0; line-height: 1.45; }
  .rpSteps li::marker { color: var(--dim); font-variant-numeric: tabular-nums; }
  .rpRule { font-size: 11.5px; margin-top: 7px; color: oklch(0.6 0.02 250); }
  .rpChecks { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .rpCheck { display: flex; gap: 12px; padding: 11px 13px; align-items: flex-start;
             border-top: 1px solid oklch(0.26 0.01 260); }
  .rpCheck:first-child { border-top: 0; }
  .rpCheckName { font-size: 13px; font-weight: 600; color: oklch(0.9 0.005 260); }
  .rpCheckBody { flex: 1; min-width: 0; }
  .rpCheckBody .rpBody { margin-top: 3px; }
  .reportItem { border-top: 1px solid #252a33; padding: 7px 0; }
  .reportItem:first-of-type { border-top: 0; }
  .reportItem .rid { color: var(--dim); font-size: 11px; font-family: ui-monospace, monospace; }
  .reportItem.open { border-left: 3px solid #8a6d1f; padding-left: 8px; }
  .objGrid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; }
  .objRow { display: contents; }
  .objKey { color: var(--dim); font-family: ui-monospace, monospace; font-size: 11px;
            text-align: right; white-space: nowrap; padding-top: 1px; }
  .objVal { word-break: break-word; }
  .objVal code { font-size: 11px; background: oklch(0.19 0.01 260); padding: 1px 5px; border-radius: 3px; }
  .objVal code.copyable { cursor: pointer; border: 1px dashed oklch(0.36 0.01 260); }
  .objVal code.copyable:hover { border-color: var(--accent); color: var(--accent); }
  .objVal a { cursor: pointer; }
  .mrLink { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 12px;
            border-radius: 6px; background: #1f3d2f; color: #4ae8a0; text-decoration: none;
            border: 1px solid #2a6b3f; }
  .answerBox { display: flex; gap: 6px; margin-top: 6px; }
  .answerBox input { min-width: 0; }
  /* ~10 rows, then scroll: the change-log on a long-lived card is hundreds of rows and would
     otherwise push the comments (and the reply box) off the bottom of the pane. */
  .activity { font-size: 12px; max-height: 232px; overflow-y: auto;
              border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px;
              background: var(--sunken); }
  .activity .ev { display: flex; gap: 8px; padding: 4px 0; align-items: center; flex-wrap: wrap;
                  border-top: 1px solid oklch(0.26 0.01 260); }
  .activity .ev:first-child { border-top: 0; }
  .activity .t { color: var(--dim); white-space: nowrap; }
  .activity .who { color: var(--accent); white-space: nowrap; }
  .activity .forced { color: var(--danger); font-weight: 600; }
  details.ext { margin-top: 12px; font-size: 12px; }
  details.ext pre { background: #14161a; border: 1px solid var(--border); border-radius: 6px;
                    padding: 8px; overflow-x: auto; max-height: 180px; }
  form { display: flex; gap: 8px; margin-top: 12px; }
  input[type=text] { flex: 1; background: var(--card); border: 1px solid var(--border);
                     color: var(--text); border-radius: 6px; padding: 7px 9px; }
  button { background: var(--accent); border: 0; color: white; border-radius: 6px;
           padding: 7px 14px; cursor: pointer; }
  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
           background: var(--danger); color: white; padding: 8px 16px; border-radius: 8px;
           opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 80vw; }
  #toast.show { opacity: 1; }
  .chip.live { border-color: var(--ok); color: var(--ok); }
  button.linkbtn { background: transparent; color: var(--accent); border: 1px solid var(--border);
                   padding: 2px 8px; font-size: 12px; border-radius: 6px; cursor: pointer; }
  button.linkbtn:hover { border-color: var(--accent); }
  /* session-log viewer */
  .logView { font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background: #14161a;
             border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-top: 10px;
             max-height: 62vh; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
  .logView .le { padding: 3px 0; border-top: 1px solid #20242c; }
  .logView .le:first-child { border-top: 0; }
  .logView .role { color: var(--dim); font-size: 10px; text-transform: uppercase;
                   letter-spacing: .05em; margin-right: 6px; }
  .logView .le.assistant .role { color: var(--accent); }
  .logView .le.tool_use { color: #cbd6e6; }
  .logView .le.tool_use .role { color: var(--ok); }
  .logView .le.tool_result { color: var(--dim); }
  .logView .le.thinking { color: var(--dim); font-style: italic; }
  .logView .le.summary { color: var(--dim); }
  /* the agent's own prose, rendered as the markdown it is */
  .logView .lemd { display: inline; }
  .logView .lemd .md-h { margin: 8px 0 2px; color: oklch(0.95 0.01 260); font-size: 12.5px; }
  .logView .lemd .md-p { margin: 2px 0; }
  .logView .lemd strong { color: oklch(0.97 0.005 260); }
  .logView .lemd code.md-ic { background: oklch(0.24 0.012 260); color: oklch(0.84 0.07 250); }
  .logView .lemd .md-list { margin: 2px 0; padding-left: 18px; }
  /* machine chatter (tool payloads, JSON fragments): present, quiet, one line */
  .logView .le.raw { opacity: .45; }
  .logView .le.raw:hover { opacity: .9; }
  .logView .le.raw code { font-size: 11px; color: oklch(0.66 0.02 260); }
  /* rendered markdown (card description + comments) */
  .md-h { font-size: 13px; font-weight: 600; text-transform: none; letter-spacing: 0;
          color: var(--text); margin: 12px 0 4px; }
  h1.md-h { font-size: 15px; } h2.md-h { font-size: 14px; }
  .md-p { margin: 6px 0; }
  .md-p:first-child { margin-top: 0; }
  .md-list { margin: 6px 0; padding-left: 22px; }
  /* tables: wide ones scroll inside their own box rather than stretching the panel */
  .md-tw { overflow-x: auto; margin: 8px 0; }
  .md-tbl { border-collapse: collapse; font-size: 12.5px; width: 100%; }
  .md-tbl th, .md-tbl td { border: 1px solid var(--border); padding: 5px 9px; text-align: left;
                           vertical-align: top; }
  .md-tbl th { background: oklch(0.24 0.012 260); font-weight: 700; color: oklch(0.9 0.01 260);
               white-space: nowrap; }
  .md-tbl tr:nth-child(even) td { background: oklch(0.205 0.01 260); }
  .md-list li { margin: 2px 0; }
  .md-ic { background: #14161a; border: 1px solid var(--border); border-radius: 4px;
           padding: 0 4px; font-family: ui-monospace, monospace; font-size: 12px; }
  .md-code { background: #14161a; border: 1px solid var(--border); border-radius: 6px;
             padding: 8px; overflow-x: auto; margin: 8px 0; }
  .md-code code { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre; }
  .desc a, .comment a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>kanban<span>-pro</span></h1>
  <div class="hdrDiv"></div>
  <div class="pill" title="active profile · actor">
    <span class="pillKey">profile</span><span id="profile"></span>
    <span class="pillKey">actor</span><span id="actor"></span>
  </div>
  <select id="boardSel" title="board"></select>
  <div class="meta">
    <button type="button" id="dashBtn" class="dashBtn" title="attention, activity and the running session">
      <span class="cdot"></span>Dashboard<span class="attnCount" id="hdrAttn" hidden>0</span>
    </button>
    <div class="filters">
      <label title="hide lanes with no visible cards"><input type="checkbox" id="fEmpty"> empty</label>

<script>
/* Push-fed board: one snapshot per board switch, then SSE deltas. No polling timers. */
let boardId = null, lastBoard = null, activeTab = 'report', lastHas = null, cursor = 0, es = null, refreshTimer = null, reconnectTimer = null, detailRefreshTimer = null, openCardId = null, knownAssignees = [], reportRequiredByAssignee = {}, reportSectionOrder = [], reportSectionOrderByAssignee = {}, maxRetries = 5;

const A = (paths) => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg> `;
const ASSIGNEE_GLYPHS = {
  "prepare": A(`<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>`),
  "builder-coder": A(`<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>`),
  "builder-architect": A(`<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>`),
  "reviewer": A(`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`),
  "rebaser": A(`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`),
  "scribe": A(`<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>`),
  "analytics": A(`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`),
  "status-audit": A(`<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`),
  "discovery": A(`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`),
  "builder-sonnet": A(`<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`),
  "dispatcher": A(`<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>`),
  "hermes-engineer": A(`<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`),
};

/* --- the hue system (design: "Redesign for readability") ------------------------------
   Colour carries meaning, so it must be STABLE: the same agent is the same hue on a card,
   in a comment, in the activity feed. Hues are derived, not hand-assigned per class, so a
   new agent or lane gets a coherent colour without a CSS edit. */
const AGENT_HUE = {
  "claude-code": 255, "codex": 300, "hermes-engineer": 175, "builder-architect": 70,
  "reviewer": 15, "reviewer-architect": 15, "rebaser": 150, "scribe": 305, "discovery": 200,
  "analytics": 255, "status-audit": 175, "prepare": 40, "builder-coder": 250,
  "builder-sonnet": 340, "dispatcher": 220, "jan": 60,
};
//: lane hue by column CATEGORY — the portable semantic (a board's column NAMES are free-form,
//: its categories are not), so any board colours correctly without configuration.
const LANE_HUE = { triage: 220, backlog: 220, unstarted: 250, started: 70, done: 150, canceled: 25 };
const agentHue = a => {
  const name = String(a ?? "").split(":").pop();
  if (AGENT_HUE[name] != null) return AGENT_HUE[name];
  // stable fallback: hash the name to a hue, so an unlisted agent is still consistently coloured
  let h = 0;
  for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) % 360;
  return h;
};
const laneHue = col => LANE_HUE[col?.category] ?? 260;
/* Cards fade as they go stale (>24h), floor at 7d — old work recedes without disappearing. */
function ageOpacity(ts) {
  if (!ts) return 1;
  const h = (Date.now() - new Date(ts).getTime()) / 3600000;
  if (h <= 24) return 1;
  if (h >= 168) return 0.4;
  return +(1 - ((h - 24) / 144) * 0.6).toFixed(3);
}
//: a uuid is unreadable in a feed; 8 chars is enough to recognise and to click
const shortId = id => { const s = String(id || ""); return s.length > 12 ? s.slice(0, 8) + "…" : s; };
/* The change-log spans the whole PROFILE, so a feed row can name a lane on a board we are not
   looking at. A hermes column id is "<board>:<lane>" — say the lane, not the id. */
const laneLabel = colId => {
  const c = (lastBoard ? lastBoard.columns : []).find(x => x.id === colId);
  if (c) return c.name;
  const raw = String(colId || "");
  return raw.includes(":") ? raw.split(":").pop() : shortId(raw);
};
/* Titles for cards that aren't on the current board, fetched once and remembered — the feed is
   about WHAT happened to WHICH work, and an 8-char uuid does not tell you the second part. */
const titleCache = new Map();
/* Comment BODIES for the feed. The change-log event deliberately stays slim ({card_id, author}),
   so the body is read from the card and remembered by comment id. One fetch per card, not per
   event — a card with 40 comments is one call. */
const commentCache = new Map();
async function enrichComments(events) {
  const cards = [...new Set(events.filter(e => e.entity === "comment" && e.op === "added")
                                  .filter(e => !commentCache.has(e.entity_id))
                                  .map(e => (e.data || {}).card_id).filter(Boolean))];
  if (!cards.length) return false;
  await Promise.all(cards.map(async id => {
    try {
      const d = await api(`/api/cards/${id}`);
      for (const c of d.comments || []) commentCache.set(c.id, c.body);
    } catch {
      // The card 404s: the change-log spans the whole profile and still carries events for
      // cards that live on the legacy hermes board (t_a05be981…), which this store never had.
      // Say so — a "…" and a dead link pretend the content is merely late.
      titleCache.set(id, null);
    }
  }));
  // whatever we could not resolve is now explicitly known-missing, so the feed stops guessing
  for (const e of events) if (e.entity === "comment" && !commentCache.has(e.entity_id))
    commentCache.set(e.entity_id, null);
  return true;
}
async function enrichTitles(ids) {
  const missing = [...new Set(ids)].filter(id => id && !titleCache.has(id));
  if (!missing.length) return false;
  await Promise.all(missing.map(async id => {
    try { const d = await api(`/api/cards/${id}`); titleCache.set(id, d.card.title); }
    catch { titleCache.set(id, null); }        // remember the failure; don't re-ask every render
  }));
  return true;
}
const agentChip = (actor, extra = "") => {
  const name = String(actor ?? "").split(":").pop();
  return `<span class="chip ${extra}" style="--chip-h:${agentHue(name)}"><span class="cdot"></span>${esc(name)}</span>`;
};

const $ = id => document.getElementById(id);
const api = async (path, opts) => {
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg = res.statusText;
    try { msg = (await res.json()).message || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
};
const toast = msg => {
  $("toast").textContent = msg; $("toast").classList.add("show");
  setTimeout(() => $("toast").classList.remove("show"), 3500);
};

async function loadMeta() {
  const m = await api("/api/meta");
  $("profile").textContent = m.profile;
  $("actor").textContent = m.actor;
  knownAssignees = m.known_assignees || [];
  reportRequiredByAssignee = m.report_required_by_assignee || {};
  reportSectionOrder = m.report_section_order || [];
  reportSectionOrderByAssignee = m.report_section_order_by_assignee || {};
  maxRetries = m.max_retries || 5;
}

async function loadBoards() {
  const boards = await api("/api/boards");
  const sel = $("boardSel");
  sel.innerHTML = "";
  for (const b of boards) sel.add(new Option(b.name, b.id));
  if (boards.length && !boardId) boardId = boards[0].id;
  sel.value = boardId;
  sel.onchange = () => { boardId = sel.value; refresh(); };
}

function age(ts) {
  if (!ts) return "";
  const s = (Date.now() - new Date(ts).getTime()) / 1000;
  if (s < 3600) return Math.max(1, Math.round(s / 60)) + "m";
  if (s < 86400) return Math.round(s / 3600) + "h";
  return Math.round(s / 86400) + "d";
}

/* --- collapsed lanes (client-only, persisted): a folded lane stays on the board as a 44px
   rail rather than vanishing, so you can always see it exists and click it back open. --- */
const COLLAPSE_KEY = "kanban-pro-collapsed";
const collapsedSet = () => {
  try { return new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY)) || []); } catch { return new Set(); }
};
const isCollapsed = colId => collapsedSet().has(colId);
function toggleCollapsed(colId) {
  const s = collapsedSet();
  s.has(colId) ? s.delete(colId) : s.add(colId);
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...s]));
}

/* --- view filters (client-only, persisted in localStorage) --- */
const FILTER_KEY = "kanban-pro-filters", STALE_MS = 7 * 86400 * 1000;
function filterState() {
  try { return JSON.parse(localStorage.getItem(FILTER_KEY)) || {}; } catch { return {}; }
}
function isStale(card) {                 // no activity in >7 days
  const ts = card.updated_at || card.created_at;
  return !!ts && (Date.now() - new Date(ts).getTime()) > STALE_MS;
}
function initFilters() {
  const f = filterState();
  $("fEmpty").checked = !!f.empty;
  $("fDone").checked = !!f.done;
  $("fStale").value = f.stale || "show";
  const onChange = () => {
    localStorage.setItem(FILTER_KEY, JSON.stringify(
      { empty: $("fEmpty").checked, done: $("fDone").checked, stale: $("fStale").value }));
    refresh();
  };
  for (const id of ["fEmpty", "fDone", "fStale"]) $(id).onchange = onChange;
}

function cardEl(card) {
  const el = document.createElement("div");
  el.className = "card"; el.draggable = true; el.dataset.id = card.id;
  const ext = card.ext || {};
  const chips = [];
  // attention leads, always: it is the one badge that means "a human or agent must act"
  if (ext["kanban_pro.attention"]) {
    const sev = ext["kanban_pro.attention"].severity || "block";
    chips.push(`<span class="chip attn"><span class="cdot"></span>${esc(sev)}</span>`);
  }
  /* The claim chip and the assignee chip were BOTH rendered even when they name the same agent
     (the normal case: a worker claims the card it is assigned to). That duplicate is what pushed
     the badges onto a second row. One agent → one chip; the ▶ says it is running. */
  const owner = ext._claim ? String(ext._claim.owner).split(":").pop() : null;
  if (ext._claim) {
    const hasLog = !!((ext.session || {}).log || (ext.work || {}).log);
    chips.push(`<span class="chip live" title="claimed by ${esc(ext._claim.owner)}${hasLog ? " · session log linked" : ""}"><span class="cdot"></span>▶ ${esc(owner)}${hasLog ? " 📜" : ""}</span>`);
  }
  for (const a of card.assignees || []) {
    if (a === owner) continue;                       // already shown, as the running chip
    const known = knownAssignees.includes(a);
    chips.push(`<span class="chip ${known ? "" : "unknown"}" style="--chip-h:${agentHue(a)}"><span class="cdot"></span>${esc(a)}</span>`);
  }
  // first-class card.priority (0-10, higher = more urgent) wins; the ext.hermes/ext.work
  // priorities are the older backend-supplied ones, kept as a fallback for legacy cards.
  const prio = card.priority || ((ext.hermes || {}).priority ?? (ext.work || {}).priority);
  if (prio != null && prio !== 0) chips.push(`<span class="chip" style="--chip-h:${prio >= 7 ? 25 : 250}"><span class="cdot"></span>p${esc(prio)}</span>`);
  if (ext["kanban_pro.scheme"]) chips.push(`<span class="chip"><span class="cdot"></span>${esc(ext["kanban_pro.scheme"])}</span>`);
  const retry = (ext.work || {}).retry_at;
  if (retry) chips.push(`<span class="chip" style="--chip-h:200"><span class="cdot"></span>📅 ${esc(new Date(retry * 1000).toLocaleString())}</span>`);

  // the card's accent = its primary agent's hue (attention overrides to amber): the left edge
  // alone tells you who owns the card, without reading a word of it
  const primary = (card.assignees || [])[0] || (ext._claim || {}).owner;
  const accH = ext["kanban_pro.attention"] ? 70 : (primary ? agentHue(primary) : 260);
  el.style.setProperty("--acc-h", accH);
  el.style.opacity = ageOpacity(card.updated_at || card.created_at);

  const when = age(card.updated_at || card.created_at);
  el.innerHTML = `<div class="badges">${chips.join("")}</div>
                  <div class="t">${esc(card.title)}</div>
                  ${ext._last_comment ? `<div class="preview">${esc(ext._last_comment)}</div>` : ""}
                  <div class="sub">
                    <span class="hash">${esc(card.id.slice(0, 10))}</span>
                    <button type="button" class="copy" title="Copy card id">copy id</button>
                    ${when ? `<span class="when">${when}</span>` : ""}
                  </div>`;
  el.querySelector(".copy").addEventListener("click", async ev => {
    ev.stopPropagation();                     // the card itself opens the dialog on click
    const btn = ev.currentTarget;
    try { await navigator.clipboard.writeText(card.id); } catch { return toast("clipboard blocked"); }
    btn.textContent = "copied ✓"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "copy id"; btn.classList.remove("copied"); }, 1400);
  });
  el.addEventListener("dragstart", ev => ev.dataTransfer.setData("text/plain", card.id));
  el.addEventListener("click", () => openCard(card.id));
  return el;
}
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* Minimal, dependency-free markdown for card descriptions + comments. HTML is escaped
   FIRST, then a safe subset is applied — headings, bold/italic, inline + fenced code,
   ordered/unordered lists, [text](url) links and bare URLs (http/https/mailto/relative
   only). No raw HTML can pass through. Kept small on purpose; not a full CommonMark. */
function mdInline(s) {                          /* s is already HTML-escaped */
  const toks = [];
  const stash = html => `\u0000${toks.push(html) - 1}\u0000`;
  s = s.replace(/`([^`]+)`/g, (_, c) => stash(`<code class="md-ic">${c}</code>`));
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, txt, url) =>
    /^(https?:|mailto:|\/)/.test(url) ? stash(`<a href="${url}" target="_blank" rel="noopener">${txt}</a>`) : `[${txt}](${url})`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\s][^*]*)\*/g, "$1<em>$2</em>").replace(/(^|[^_\w])_([^_\s][^_]*)_/g, "$1<em>$2</em>");
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, (_, pre, url) => pre + stash(`<a href="${url}" target="_blank" rel="noopener">${url}</a>`));
  return s.replace(/\u0000(\d+)\u0000/g, (_, n) => toks[n]);
}
/* GFM pipe tables. Agents put their check matrices and comparisons in tables, and without this
   they rendered as a wall of pipes and dashes — the one shape whose whole point is being read at
   a glance. A table is a header row, a |---|---| separator, then body rows. */
const TABLE_SEP = /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/;
const isTableRow = l => /\|/.test(l) && l.trim().length > 0;
const tableCells = l => l.trim().replace(/^\||\|$/g, "").split("|").map(c => c.trim());

function md(src) {
  const lines = String(src ?? "").replace(/\r\n?/g, "\n").split("\n");
  const isBlock = l => /^(#{1,6})\s|^```|^\s*\d+\.\s|^\s*[-*+]\s|^\s*$/.test(l);
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    let m;
    if (isTableRow(line) && i + 1 < lines.length && TABLE_SEP.test(lines[i + 1])) {
      const head = tableCells(line);
      i += 2;                                    /* skip the header and the separator */
      const body = [];
      while (i < lines.length && isTableRow(lines[i])) body.push(tableCells(lines[i++]));
      out.push(
        `<div class="md-tw"><table class="md-tbl"><thead><tr>` +
        head.map(c => `<th>${mdInline(esc(c))}</th>`).join("") +
        `</tr></thead><tbody>` +
        body.map(r => `<tr>${head.map((_, n) => `<td>${mdInline(esc(r[n] ?? ""))}</td>`).join("")}</tr>`).join("") +
        `</tbody></table></div>`);
      continue;
    }
    if (/^```/.test(line)) {                    /* fenced code — verbatim, no inline md */
      const buf = []; i++;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) buf.push(lines[i++]);
      i++;                                       /* skip closing fence */
      out.push(`<pre class="md-code"><code>${esc(buf.join("\n"))}</code></pre>`);
    } else if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
      const n = m[1].length;
      out.push(`<h${n} class="md-h">${mdInline(esc(m[2]))}</h${n}>`);
      i++;
    } else if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*\d+\.\s+/, ""));
      out.push(`<ol class="md-list">${items.map(t => `<li>${mdInline(esc(t))}</li>`).join("")}</ol>`);
    } else if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*[-*+]\s+/, ""));
      out.push(`<ul class="md-list">${items.map(t => `<li>${mdInline(esc(t))}</li>`).join("")}</ul>`);
    } else if (/^\s*$/.test(line)) {
      i++;
    } else {                                     /* paragraph: gather until blank/block */
      const para = [];
      while (i < lines.length && !isBlock(lines[i])) para.push(mdInline(esc(lines[i++])));
      out.push(`<p class="md-p">${para.join("<br>")}</p>`);
    }
  }
  return out.join("");
}

async function refresh() {
  if (!boardId) return;
  const snap = await api(`/api/boards/${boardId}`);
  lastBoard = snap.board;          // the dialog needs every lane (incl. flow-illegal ones)
  dashCards = snap.cards;          // the dashboard rails read the same snapshot
  cursor = Math.max(cursor, snap.cursor);
  refreshAttnBadge();
  if ($("dashDlg").open) renderDash();   // keep the dashboard live while it is open
  const root = $("board");
  root.innerHTML = "";
  const f = filterState();
  for (const col of [...snap.board.columns].sort((a, b) => a.order - b.order)) {
    // hide done: terminal lanes (done + canceled/won't-do) — reduces end-of-pipeline clutter
    if (f.done && (col.category === "done" || col.category === "canceled")) continue;
    let cards = snap.cards.filter(c =>
      (c.placements || []).some(p => p.board_id === boardId && p.column_id === col.id));
    if (f.stale === "hide") cards = cards.filter(c => !isStale(c));
    if (f.empty && !cards.length) continue;   // hide empty: drop lanes with nothing to show
    cards.sort((a, b) => {
      const pa = a.placements.find(p => p.column_id === col.id).position;
      const pb = b.placements.find(p => p.column_id === col.id).position;
      // every move lands at position 0, so lanes like done are all ties —
      // break them by recency, newest activity on top
      return (pa - pb) || String(b.updated_at ?? "").localeCompare(String(a.updated_at ?? ""));
    });
    const el = document.createElement("div");
    el.className = "col" + (cards.length ? "" : " empty") + (isCollapsed(col.id) ? " collapsed" : "");
    el.style.setProperty("--lane-h", laneHue(col));
    el.innerHTML = `<h2 title="click to fold this lane">
                      <span class="laneDot"></span>
                      <span class="laneName">${esc(col.name)}</span>
                      <span class="laneCount">${cards.length}${col.wip_limit ? "/" + col.wip_limit : ""}</span>
                    </h2>`;
    el.querySelector("h2").addEventListener("click", () => { toggleCollapsed(col.id); refresh(); });
    const list = document.createElement("div");
    list.className = "cards";
    for (const c of cards) {
      const cardE = cardEl(c);
      if (f.stale === "dim" && isStale(c)) cardE.classList.add("stale");  // gray out, keep visible
      list.appendChild(cardE);
    }
    el.appendChild(list);
    el.addEventListener("dragover", ev => { ev.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave", () => el.classList.remove("dragover"));
    el.addEventListener("drop", async ev => {
      ev.preventDefault(); el.classList.remove("dragover");
      const id = ev.dataTransfer.getData("text/plain");
      try {
        await api(`/api/cards/${id}/move`, {
          method: "POST", headers: {"content-type": "application/json"},
          body: JSON.stringify({to_board_id: boardId, to_column_id: col.id, position: 0}),
        });
      } catch (e) { toast(e.message); }
      /* no manual refresh — the SSE event triggers it */
    });
    root.appendChild(el);
  }
  connect();
}

function scheduleRefresh() {           /* debounce bursts of pushed events */
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(refresh, 150);
}

function scheduleOpenCardRefresh() {    /* keep an already-open detail dialog live */
  if (!openCardId) return;
  clearTimeout(detailRefreshTimer);
  detailRefreshTimer = setTimeout(() => {
    if (openCardId) openCard(openCardId);
  }, 150);
}

function connect() {
  /* A live/connecting stream is fine; a CLOSED one (e.g. died silently on sleep,
     with no onerror) must be replaced or the board stays frozen. */
  if (es && es.readyState !== EventSource.CLOSED) return;
  if (es) { try { es.close(); } catch {} es = null; }
  es = new EventSource(`/api/events?since=${cursor}`);
  es.onopen = () => $("liveDot").classList.add("live");
  /* EventSource auto-retries only while CONNECTING; a CLOSED stream (HTTP error
     during a server restart, laptop sleep, a dropped connection) is terminal and
     never revives itself. Since the board is push-only with no polling fallback,
     that silently freezes it. Tear the dead stream down and reconnect with a short
     backoff, then refresh() to catch any moves missed while we were dark. */
  es.onerror = () => {
    $("liveDot").classList.remove("live");
    if (es && es.readyState === EventSource.CLOSED) {
      try { es.close(); } catch {}
      es = null;
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => { connect(); refresh(); }, 2000);
    }
  };
  es.onmessage = msg => {
    cursor = Math.max(cursor, Number(msg.lastEventId) || 0);
    const ev = JSON.parse(msg.data);
    /* refresh when the event touches this board — or when we can't tell */
    const relevant = !ev.board_id || ev.board_id === boardId || ev.entity !== "board";
    if (relevant) {
      scheduleRefresh();
      scheduleOpenCardRefresh();
    }
    /* agent let go of the card we're tailing -> its session is done, stop live polling */
    if (logCardId && ev.entity_id === logCardId && ev.op === "released") stopLogPolling();
  };
}

function relLabel(r, id) {
  /* kind describes from relative to to: PARENT = from is the parent of to */
  if (r.kind === "parent") return r.from_card === id ? "subcard" : "parent";
  if (r.kind === "child")  return r.from_card === id ? "parent" : "subcard";
  return r.kind.replace("_", " ");
}

function reportText(v) {
  if (v == null) return "";
  if (typeof v === "string") return v;
  if (typeof v === "object") {
    return v.text || v.summary || v.result || v.verdict || "";
  }
  return String(v);
}

function renderReportList(title, rows, cardId, kind) {
  if (!Array.isArray(rows) || !rows.length) return "";
  return reportSection(kind, title, rows.map(r => {
    const status = r.status ? `<span class="chip">${esc(r.status)}</span>` : "";
    const sev = r.severity ? `<span class="chip">${esc(r.severity)}</span>` : "";
    const open = kind === "questions" && (r.title || r.text) && r.status !== "answered" && r.status !== "canceled";
    const evidence = r.evidence ? `<div style="color:var(--dim);margin-top:4px">${md(r.evidence)}</div>` : "";
    const answer = r.answer ? `<div style="margin-top:5px"><b>Answer:</b> ${md(r.answer)}</div>` : "";
    const answerBox = open ? `<div class="answerBox">
      <input type="text" id="ans-${esc(r.id)}" placeholder="answer ${esc(r.id)}">
      <button type="button" onclick="answerQuestion('${esc(cardId)}','${esc(r.id)}')">Answer</button>
    </div>` : "";
    // Render extra fields (beyond id/status/severity/evidence/answer) as mini key-value grid
    const known = new Set(["id", "status", "severity", "evidence", "answer", "text", "summary", "result", "verdict"]);
    const extras = Object.entries(r).filter(([k, v]) => !known.has(k) && v != null && v !== "" && !(Array.isArray(v) && v.length === 0));
    const extraHtml = extras.length
      ? `<div class="objGrid" style="margin-top:4px">${extras.map(([k, v]) => {
          const label = esc(k.replace(/_/g, " "));
          const val = typeof v === "string" ? md(v) : Array.isArray(v)
            ? v.map(i => typeof i === "string" ? esc(i) : renderInlineItem(i)).join("<br>")
            : esc(JSON.stringify(v, null, 1).slice(0, 200));
          return `<span class="objKey">${label}</span><span class="objVal">${val}</span>`;
        }).join("")}</div>`
      : "";
    return `<div class="reportItem${open ? " open" : ""}">
      <div><span class="rid">${esc(r.id || "")}</span> ${status} ${sev}</div>
      <div>${md(reportText(r))}</div>${evidence}${answer}${answerBox}${extraHtml}
    </div>`;
  }).join(""));
}

/* The verification contract (card.checks) — the ONLY card state that gates the flow, so it is
   rendered on its own, above the report, and never mixed in with the narrative sections. A
   worker's prose about what it checked is a story; this is the receipt. Anything that is not a
   pass is coloured as a hole, because it is one: `skipped` ("chose not to") and `blocked`
   ("couldn't") are as unverified as `pending`. */
function renderChecks(checks) {
  if (!Array.isArray(checks) || !checks.length) return "";
  const rows = checks.map(c => {
    const status = String(c.status || "pending").toLowerCase();
    const optional = c.required === false
      ? `<span class="chip" title="informational — never gates the card">optional</span>` : "";
    const evidence = c.evidence
      ? `<div style="color:var(--dim);margin-top:4px">${md(c.evidence)}</div>`
      : `<div style="color:var(--dim);margin-top:4px"><i>no evidence recorded</i></div>`;
    return `<div class="reportItem">
      <div><span class="rid">${esc(c.key || "")}</span> ${pill(OUTCOME[status], status)} ${optional}</div>
      <div>${md(c.text || "")}</div>${evidence}
    </div>`;
  }).join("");
  const open = checks.filter(c => c.required !== false && !checkPassed(c.status)).length;
  const title = open ? `Verification — ${open} not passed` : "Verification — all passed";
  return reportSection("checks", title, rows);
}

function renderInlineItem(v) {
  if (typeof v === "string") return esc(v);
  const txt = v.text || v.note || v.title || JSON.stringify(v).slice(0, 120);
  return esc(txt);
}

const REPORT_SECTION_LABELS = {
  about: "About",
  questions: "Questions",
  findings: "Findings",
  plan: "Plan",
  needs: "Needs",
  checks: "Checks",
  analysis_log: "Analysis",
  verdict: "Verdict",
  handoff: "Handoff",
};

/* --- collapsed work-report sections (client-only, persisted in localStorage) ---
   Keyed by SECTION, not by card: collapse "Analysis" once and it stays collapsed on every
   card you open — the point is to hide a section you don't care to read, and that preference
   is about the section, not about one card. */
const REPORT_COLLAPSE_KEY = "kanban-pro-report-collapsed";
function collapsedSections() {
  try { return new Set(JSON.parse(localStorage.getItem(REPORT_COLLAPSE_KEY)) || []); } catch { return new Set(); }
}
function toggleReportSection(kind) {
  const collapsed = collapsedSections();
  collapsed.has(kind) ? collapsed.delete(kind) : collapsed.add(kind);
  localStorage.setItem(REPORT_COLLAPSE_KEY, JSON.stringify([...collapsed]));
  for (const el of document.querySelectorAll(`.reportSec[data-sec="${CSS.escape(kind)}"]`)) {
    el.classList.toggle("collapsed", collapsed.has(kind));
  }
}
function reportSection(kind, title, body) {
  const key = kind || "unknown";
  const isCollapsed = collapsedSections().has(key);  // applied at render time, so no flash on open
  return `<section class="reportSec${isCollapsed ? " collapsed" : ""}" data-sec="${esc(key)}">`
    + `<h4 class="hdr-${esc(key)}" onclick="toggleReportSection('${esc(key)}')" title="click to collapse">`
    + `<span class="secCaret">▾</span>${esc(title)}</h4>`
    + `<div class="secBody">${body}</div></section>`;
}

function isReportSectionEmpty(value) {
  if (value === null || value === undefined || value === "") return true;
  if (Array.isArray(value)) return value.length === 0;
  if (typeof value === "object") return Object.keys(value).length === 0;
  return false;
}

/* --- typed report renderers (the design's shapes) --------------------------------------
   The generic renderer prints ANY section as a key/value grid, which is why the report read
   like a spreadsheet: a finding's severity, its file:line and its fix all looked exactly like
   its id. kanban-pro can't stop being generic — a worker may file any section it likes — but
   the sections we DO know the shape of deserve their real shape. Known → typed; unknown →
   the generic grid, unchanged. */
/* A check that did not RUN is not a neutral fact — it is a hole in the verification, and it was
   rendered in the same grey as "skipped on purpose". Anything that isn't a pass reads as a
   problem: failures in red, un-run checks in amber. A pass verdict sitting on top of un-run
   checks is precisely the thing the dispatcher refuses, so the UI must not launder it either. */
const OUTCOME = {
  passed:      { h: 150, label: "PASS" },
  pass:        { h: 150, label: "PASS" },
  ok:          { h: 150, label: "PASS" },
  done:        { h: 150, label: "PASS" },
  failed:      { h: 15,  label: "FAIL" },
  fail:        { h: 15,  label: "FAIL" },
  "needs-fix": { h: 15,  label: "NEEDS FIX" },
  error:       { h: 15,  label: "ERROR" },
  skipped:     { h: 70,  label: "NOT RUN" },
  not_run:     { h: 70,  label: "NOT RUN" },
  "not-run":   { h: 70,  label: "NOT RUN" },
  pending:     { h: 70,  label: "PENDING" },
  todo:        { h: 70,  label: "NOT RUN" },
  blocked:     { h: 70,  label: "BLOCKED" },
};
//: is this check outcome a PASS? Everything else — including "not run" — is unresolved.
const checkPassed = o => ["passed", "pass", "ok", "done"].includes(String(o || "").toLowerCase());
const checkFailed = o => ["failed", "fail", "needs-fix", "error"].includes(String(o || "").toLowerCase());
const SEV = { high: { h: 15, label: "HIGH" }, critical: { h: 15, label: "CRITICAL" },
              med: { h: 70, label: "MED" }, medium: { h: 70, label: "MED" },
              low: { h: 250, label: "LOW", flat: true }, info: { h: 250, label: "INFO", flat: true } };
const pill = (meta, fallback) => {
  const m = meta || { h: 260, label: String(fallback || "").toUpperCase(), flat: true };
  return `<span class="rpPill${m.flat ? " flat" : ""}" style="--p-h:${m.h}">${esc(m.label)}</span>`;
};

/* ONE SENTENCE: where does this task stand, and must I act?
   The report shows a verdict, a plan and some checks and leaves you to work out what they add
   up to — "is this done, is it waiting on me, is it for the next pass?". This says it, in the
   order that matters: a blocking flag beats a running agent beats a broken verification beats a
   verdict. `act` is true only when the answer is genuinely YOURS to give. */
function statusLine(card, ext, claim, missing) {
  const att = ext["kanban_pro.attention"];
  const wr = ext.work_report || {};
  /* "Blocked — waiting on X" tells you the STATE and not the MOVE. The card usually already says
     what it wants doing — the handoff's instruction, or the reason on the flag — and burying that
     two panes away is what makes a card feel like it suggests nothing. */
  const ho = wr.handoff && typeof wr.handoff === "object" ? wr.handoff : {};
  const short = t => { t = String(t || ""); return t.length > 150 ? t.slice(0, 148) + "…" : t; };
  const doNext = ho.explicit_instruction || ho.instruction || ho.next || ho.text || "";
  const nextActor = ho.next_actor ? String(ho.next_actor).split(":").pop() : "";
  /* The gate is `card.checks` — the declared contract, resolved with evidence. `wr.checks` is
     legacy narrative the worker wrote about itself, and reading it here is what let a card look
     verified while its required check had never run (AIR-2915). Fall back to it ONLY for cards
     that predate the contract, so their history still renders. */
  const checks = Array.isArray(card.checks) && card.checks.length
    ? card.checks
    : (Array.isArray(wr.checks) ? wr.checks : []);
  const name = c => c.key || c.name || c.id;
  const plan = Array.isArray(wr.plan) ? wr.plan : [];
  const openQ = (wr.questions || []).filter(q => q && !q.answer && q.status !== "canceled").length;
  const failed = checks.filter(c => checkFailed(c.status || c.outcome));
  //: `required !== false` — a legacy report check has no `required` field and still counts.
  const unrun = checks.filter(c => c.required !== false
    && !checkPassed(c.status || c.outcome) && !checkFailed(c.status || c.outcome));
  const doing = plan.find(p => p.status === "doing");
  const verdict = typeof wr.verdict === "string" ? wr.verdict : (wr.verdict || {}).status;

  if (att && (att.severity || "block") === "block") {
    const who = att.for ? String(att.for).split(":").pop() : "you";
    const ask = openQ
      ? `Blocked — an agent asked a question and is waiting on ${who}. Answer it above and the card resumes.`
      : `Blocked — waiting on ${who}: ${short(att.reason)}`;
    return { h: 15, act: !att.for || /jan|human/.test(String(att.for)),
             text: ask, next: doNext || "", nextActor };
  }
  if (claim) {
    return { h: 200, act: false,
             text: `Running now — ${String(claim.owner).split(":").pop()} holds the lease${doing ? `, working on: ${doing.text}` : ""}. Nothing for you to do.` };
  }
  if (missing.length) {
    return { h: 70, act: false,
             text: `Report incomplete — the route requires ${missing.join(", ")}, and the worker never filed ${missing.length > 1 ? "them" : "it"}. It goes back for another pass.` };
  }
  if (failed.length) {
    return { h: 15, act: false,
             text: `Needs another pass — ${failed.length} check${failed.length > 1 ? "s" : ""} failed (${failed.map(name).join(", ")}).` };
  }
  if (unrun.length) {
    return { h: 70, act: false,
             text: `Unverified — ${unrun.length} required check${unrun.length > 1 ? "s" : ""} did not pass (${unrun.map(name).join(", ")}), so any verdict above is unproven.` };
  }
  if (verdict && /pass|approve|ok|complete|done/i.test(verdict)) {
    return { h: 150, act: false, next: doNext, nextActor,
             text: `Verified — verdict "${verdict}", all ${checks.length} checks passed. Done unless you disagree.` };
  }
  if (verdict) {
    return { h: 70, act: false, next: doNext, nextActor,
             text: `Verdict "${verdict}" — not a pass, so this is for a next pass, not a merge.` };
  }
  if (doing) return { h: 200, act: false, text: `In progress — plan step "${doing.text}" is underway; no agent holds the lease right now.` };
  if (plan.length && plan.every(p => p.status === "done")) {
    return { h: 150, act: false, text: `Plan complete — every step is done, but no verdict has been filed yet.` };
  }
  return { h: 260, act: false, text: `Waiting — no agent has claimed it and nothing has been reported yet.` };
}

function renderVerdict(title, v, kind) {
  const status = typeof v === "string" ? v : (v.status || v.verdict || "");
  const summary = typeof v === "string" ? "" : (v.summary || v.text || "");
  // Case-INsensitively: workers write "APPROVE", "pass", "verify-incomplete-e2e". Matching
  // case-sensitively made "APPROVE" match nothing, so the pill fell back to echoing the status
  // and the status then printed again — "APPROVE APPROVE".
  const st = String(status).toLowerCase();
  // a verdict starting "verify-incomplete" is NOT a pass, whatever else it says
  const key = /^verify-incomplete|incomplete|blocked/.test(st) ? "skipped"
