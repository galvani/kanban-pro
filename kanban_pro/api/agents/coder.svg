<path class="line" d="m21 39-4 3 4 3M43 39l4 3-4 3M35 37l-6 10"/>
<path id="left-hand" class="line" d="M20 29 26 36"/>
<path id="right-hand" class="line" d="M44 29 38 36"/>
<path id="cursor" class="line" d="M34 48h5"/>
</svg>