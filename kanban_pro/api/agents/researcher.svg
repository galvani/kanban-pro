<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Research agent working">
<style>

  .line { fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .fill { fill: #000; }
  .paper { fill: #fff; stroke: #000; stroke-width: 2; stroke-linejoin: round; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  #scan { animation: scan 1.7s ease-in-out infinite; }
  #head { transform-box: fill-box; transform-origin: center bottom; animation: nod 1.7s ease-in-out infinite; }
  @keyframes scan { 0%,100% { transform: translateY(-7px); } 50% { transform: translateY(10px); } }
  @keyframes nod { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(4deg); } }
</style>
